# RTBIO ERP — 사용 설명서

> 의료용품 멀티테넌트 SaaS ERP · 5개 포털 **메뉴·기능·버튼 사용법** 안내서
> 생성일 2026-06-07 · 대상 독자: 실제 업무 사용자(알티바이오 직원 · 거래처)
> 보기 좋은 HTML 버전: `user-manual.html` (좌측 목차 + 화면 캡처 + 인쇄/PDF 저장)

이 문서는 각 포털의 화면을 **메뉴 순서대로**, 실제 사용 시나리오(이야기) 형태로 설명합니다.
처음 사용하신다면 `0. 시작하기` 의 로그인 방법과 공통 화면 요소부터 읽어 보세요.

---

## 0. 시작하기 (공통)

이 장은 RTBIO ERP를 처음 사용하시는 모든 분을 위한 공통 안내입니다. 어느 팀에 속해 계시든 먼저 이 장을 읽어 주시면, 로그인부터 화면 조작, 그리고 우리 회사 업무가 시스템에서 어떻게 흘러가는지 한눈에 이해하실 수 있습니다.

---

### 0-1. 로그인 방법

#### 접속 주소

웹 브라우저(크롬 권장)를 열고 주소창에 아래 주소를 입력해 주세요.

```
localhost:3000
```

> 사내망 또는 정식 서비스 주소로 운영될 때는 담당자가 안내드리는 주소(예: `altibio.rtbio-erp.com`)를 사용하시면 됩니다.

#### 로그인 절차

1. 접속하면 **로그인 화면**이 나타납니다.
2. 발급받으신 **이메일**과 **비밀번호**를 입력합니다.
3. **로그인** 버튼을 누릅니다.
4. 로그인에 성공하면, **본인 권한에 맞는 포털 화면으로 자동 이동**합니다. (예: 영업 담당자는 영업 포털, 품질팀은 QC 포털로 바로 들어갑니다.)

> 비밀번호를 5회 이상 잘못 입력하면 잠시 후 다시 시도하셔야 할 수 있습니다. 비밀번호를 잊으셨다면 경영지원팀(시스템 관리자)에 문의해 초기화를 요청해 주세요.

#### 로그인 계정표 (테스트/초기 계정)

아래는 알티바이오 초기 샘플 계정입니다. **공통 비밀번호는 `rtbio1234!`** 이며, 첫 로그인 후 반드시 비밀번호를 변경해 주세요.

| 이메일 | 이름 | 역할 | 이동 포털 | 비밀번호 |
| --- | --- | --- | --- | --- |
| `owner@rtbio.com` | 이대표 | 대표(TENANT_OWNER) | 대표 포털(CEO) | `rtbio1234!` |
| `admin@rtbio.com` | 김경영 | 경영지원(ADMIN) | 경영지원 포털(Admin) | `rtbio1234!` |
| `qc@rtbio.com` | 박품질 | 품질관리(QC) | 품질관리 포털(QC) | `rtbio1234!` |
| `sales1@rtbio.com` | 최영업 | 영업(EXEC) | 영업 포털(Exec) | `rtbio1234!` |
| `sales2@rtbio.com` | 정영업 | 영업(EXEC) | 영업 포털(Exec) | `rtbio1234!` |

#### 거래처(대리점) 계정

거래처 대리점은 **거래처 포털**로 로그인합니다. 거래처 계정 이메일은 **거래처 코드를 소문자로 바꾼 뒤 `@client.local`을 붙인 형식**입니다.

| 거래처 | 거래처 코드 | 로그인 이메일 | 비밀번호 |
| --- | --- | --- | --- |
| 서울메디칼 대리점 | C-AGEN-001 | `c-agen-001@client.local` | `rtbio1234!` |
| 부산의료기 대리점 | C-AGEN-002 | `c-agen-002@client.local` | `rtbio1234!` |
| 대전메드 대리점 | C-AGEN-003 | `c-agen-003@client.local` | `rtbio1234!` |

> 즉, 거래처 계정 이메일 = **`{거래처코드 소문자}@client.local`** 입니다. 새 대리점이 등록되면 같은 규칙으로 계정이 만들어집니다.

### 0-2. 화면 공통 요소 사용법

모든 포털은 **상단바 + 좌측 사이드바 + 본문**의 동일한 구조를 가집니다. 한 번 익혀 두시면 어느 포털에서나 똑같이 사용하실 수 있습니다.

#### 상단바 (화면 맨 위)

| 요소 | 위치 | 하는 일 |
| --- | --- | --- |
| 사용자명 | 우측 | 현재 로그인한 본인 이름과 역할이 표시됩니다. |
| 알림 종(🔔) | 우측 | 새 알림이 있으면 빨간 숫자 배지가 뜹니다. 클릭하면 알림 목록이 열립니다. |
| 비밀번호 변경 | 우측 메뉴 | 사용자명을 클릭하면 나오는 메뉴에서 비밀번호를 바꿀 수 있습니다. |
| 로그아웃 | 우측 메뉴 | 사용을 마치면 반드시 로그아웃해 주세요. (공용 PC라면 특히 중요합니다.) |

> **비밀번호 변경 방법**: 상단바 우측의 본인 이름을 클릭 → **비밀번호 변경** 선택 → 현재 비밀번호와 새 비밀번호를 입력 → 저장.

#### 좌측 사이드바 (메뉴 이동)

- 화면 왼쪽 세로 영역이 **메뉴판**입니다. 클릭하면 해당 업무 화면으로 이동합니다.
- 현재 보고 있는 메뉴는 **색이 진하게 강조**되어 어디에 있는지 쉽게 알 수 있습니다.
- 보이는 메뉴는 **본인 권한(역할)에 따라 다릅니다.** (아래 0-5 참고)

#### 공지 팝업 닫는 법

- 로그인 직후 또는 새 공지가 등록되면 화면 가운데에 **공지 팝업**이 뜰 수 있습니다.
- 내용을 확인하신 뒤 팝업의 **닫기(X)** 버튼 또는 **확인** 버튼을 누르면 사라집니다.
- "오늘 하루 보지 않기"가 있으면 체크 후 닫으면 같은 공지가 그날은 다시 뜨지 않습니다.

#### 토스트 알림 (자동으로 떴다 사라지는 메시지)

- 저장·삭제·발급 같은 작업을 하면 화면 모서리에 작은 알림 띠(토스트)가 잠깐 나타납니다.
  - **초록색**: 정상 처리됨 (예: "저장되었습니다")
  - **빨간색**: 오류 발생 (예: "재고가 부족합니다") — 메시지를 읽고 다시 시도해 주세요.
- 토스트는 몇 초 뒤 자동으로 사라지므로 따로 닫지 않으셔도 됩니다.

#### 표(목록)의 공통 조작

대부분의 목록 화면(주문, 거래처, 재고, 명세서 등)은 동일한 방식으로 다룹니다.

| 기능 | 사용법 |
| --- | --- |
| 검색 | 표 위의 **검색창**에 이름·코드·번호 일부를 입력하면 일치하는 행만 추려집니다. (대소문자 구분 없음) |
| 필터 | **상태·기간·유형** 등의 드롭다운/날짜 선택으로 원하는 조건만 골라 봅니다. (예: 주문 상태 "확정", 기간 "이번 달") |
| 정렬 | 표의 **열 제목을 클릭**하면 그 기준으로 오름차순↔내림차순 정렬됩니다. (예: 금액 큰 순) |
| 페이지네이션 | 행이 많으면 아래쪽 **페이지 번호(◀ 1 2 3 ▶)** 로 나뉘어 표시됩니다. 번호를 눌러 이동합니다. |

> 검색·필터를 적용한 상태는 보통 주소(URL)에 반영되므로, 그 상태 그대로 새로고침하거나 동료에게 링크로 공유할 수 있습니다.

### 0-3. 핵심 용어 사전

업무에서 자주 쓰는 용어를 쉬운 말로 정리했습니다. 시스템 화면에서 이 단어들을 만나면 아래 뜻으로 이해하시면 됩니다.

| 용어 | 쉬운 설명 |
| --- | --- |
| **발주(주문)** | 거래처(대리점/병원)가 "이 제품을 이만큼 보내 주세요"라고 넣는 주문입니다. 처음에는 임시저장(작성 중) 상태로 만들어집니다. |
| **발주 확정** | 임시 주문을 "이대로 진행"하겠다고 확정하는 단계입니다. 확정되면 정식 주문번호가 매겨지고, 주문 수량만큼 재고가 **예약**됩니다. |
| **예약** | 주문이 확정되면 그 수량만큼 재고를 "찜"해 둡니다. 실제 창고 수량은 그대로지만, **다른 주문에 팔 수 없는 상태**가 됩니다. |
| **출고 시작** | 확정된 주문을 실제로 보내기 위해 창고 작업(피킹·포장 등)을 시작하는 것입니다. 칸반 보드의 첫 단계로 들어갑니다. |
| **출고 완료** | 물품이 최종적으로 출하된 상태입니다. 이때 **실물재고가 실제로 차감**되고 주문은 "완료"로 바뀝니다. |
| **칸반 단계** | 출고 진행 상황을 보여 주는 단계별 보드입니다. 카드(주문)를 단계 칸으로 옮기며 진행합니다. 기본 단계: 접수대기 → 피킹 → 검수 → 포장 → 출고대기 → 출고완료. |
| **거래명세서** | 출고가 끝난 주문에 대해 발행하는 정식 거래 증빙(세금계산서 성격)입니다. 공급가액 + 부가세(VAT 10%)가 계산됩니다. |
| **수금** | 거래처가 보낸 입금을 시스템에 기록하는 것입니다. 명세서 금액과 실제 입금을 맞춰 관리합니다. |
| **거래처원장** | 거래처별로 "전월 잔액 + 이달 매출 − 이달 수금 = 이달 잔액(미수금)"을 월 단위로 정리한 장부입니다. |
| **월 마감** | 한 달의 거래처원장을 확정(잠금)하는 작업입니다. 마감 후에는 그 달 숫자가 임의로 바뀌지 않습니다. (필요 시 사유를 남기고 재오픈 가능) |
| **재고 — 실물재고** | 창고에 **실제로 놓여 있는** 수량입니다. 출고 완료 시점에 줄어듭니다. |
| **재고 — 가용재고** | 예약분을 뺀 **지금 더 팔 수 있는** 수량입니다. 주문이 확정되면 가용재고가 먼저 줄어듭니다. |
| **스냅샷 단가** | 주문(또는 배송지)을 확정하는 **그 시점의 가격·배송지 정보를 사진 찍듯 저장**해 두는 것입니다. 이후 제품 가격이나 거래처 주소가 바뀌어도 **과거 주문은 그대로 보존**됩니다. |
| **유통기한 로트(Lot)** | 같은 제품·사이즈라도 입고 묶음(로트)별로 유통기한이 다릅니다. 임박/만료 로트를 단계로 표시해 관리합니다. |

---

### 0-4. 전체 업무 흐름 한눈에

RTBIO ERP는 **하나의 주문이 거래처 → 품질팀 → 경영지원 → 대표**의 손을 거치며 완결되도록 설계되어 있습니다. 한 건의 주문이 어떻게 흘러가는지 이야기처럼 따라가 보겠습니다.

#### ① 거래처가 발주합니다 — *거래처 포털 (대리점 담당자)*

서울메디칼 대리점 담당자가 거래처 포털에 로그인해, 필요한 제품과 수량, 받을 배송지를 골라 **발주**를 넣습니다. 이때 거래처별 할인율·고정가가 자동 적용되어 **그 시점 단가가 스냅샷으로 저장**됩니다.

#### ② 영업이 확인하고, 품질팀이 확정·출고합니다 — *영업 포털 / 품질관리(QC) 포털*

- **영업 담당자**(영업 포털)는 본인이 맡은 거래처의 주문을 확인하고 챙깁니다.
- 주문이 **확정**되면 그 수량만큼 **가용재고가 예약**됩니다.
- **품질팀**(QC 포털)은 **출고 칸반 보드**에서 주문 카드를 접수대기 → 피킹 → 검수 → 포장 → 출고대기 → **출고완료** 단계로 옮기며 실제 출하를 진행합니다. 출고완료가 되면 **실물재고가 차감**되고 주문은 "완료"가 됩니다. (품질팀은 재고 현황·유통기한·샘플 출고도 함께 관리합니다.)

#### ③ 경영지원이 명세서를 발급하고 수금합니다 — *경영지원(Admin) 포털*

- 출고가 완료된 주문에 대해 경영지원팀이 **거래명세서**를 발급합니다. (공급가액 + 부가세 10% 자동 계산, PDF 출력 가능)
- 거래처가 대금을 입금하면 **수금**으로 기록하고, 명세서와 입금을 맞춰 둡니다.
- 매월 거래처별 **거래처원장**(전월 잔액 + 매출 − 수금 = 미수금)을 정리하고, 정산이 끝나면 **월 마감**을 합니다.

#### ④ 대표가 대시보드로 전체를 확인합니다 — *대표(CEO) 포털*

대표님은 CEO 포털의 **대시보드 위젯**으로 이번 달 매출, 미수금, 진행 중 주문, 만료 임박 계약 같은 핵심 지표를 한눈에 봅니다. 위젯은 보고 싶은 항목으로 직접 구성할 수 있습니다.

#### 요약: 한 건의 주문이 거치는 길

```
거래처 발주  →  영업 확인 / 확정(재고 예약)  →  품질팀 출고(칸반→출고완료, 실물재고 차감)
   거래처포털          영업포털                         QC포털
        →  경영지원 명세서 발급 + 수금 + 원장/마감  →  대표 대시보드 확인
                     경영지원포털                          CEO포털
```

> 핵심 원칙: **재고는 "예약(가용재고 차감) → 출고(실물재고 차감)"의 2단계로 관리**되고, **가격·배송지는 주문 시점에 스냅샷으로 고정**됩니다. 덕분에 나중에 가격이나 주소가 바뀌어도 과거 거래 기록은 항상 정확하게 유지됩니다.

---

### 0-5. 권한별로 보이는 메뉴가 다릅니다

RTBIO ERP는 **역할(권한)에 따라 들어가는 포털과 보이는 메뉴가 다릅니다.** 같은 시스템이지만 본인 업무에 필요한 화면만 깔끔하게 보이도록 설계되어 있습니다.

| 역할 | 들어가는 포털 | 주로 하는 일 |
| --- | --- | --- |
| 대표 (TENANT_OWNER) | 대표(CEO) 포털 | 대시보드로 전사 지표 확인, 위젯 구성. (필요 시 모든 포털 접근 가능) |
| 경영지원 (ADMIN) | 경영지원(Admin) 포털 | 거래처·제품·주문·재고·명세서·수금·원장·보고서·설정 등 전반 관리 |
| 품질관리 (QC) | 품질관리(QC) 포털 | 출고 칸반, 출고 내역, 재고 현황·알럼, 유통기한, 샘플 출고 |
| 영업 (EXEC) | 영업(Exec) 포털 | 내 거래처·주문 관리, 담당자별 매출, 학회 방명록 |
| 거래처 (CLIENT) | 거래처 포털 | 본인 회사의 발주·명세서·수금·계약·내 정보 조회 (읽기 위주) |

> - 메뉴가 안 보인다면 **권한이 없는 화면**일 수 있습니다. 필요한 화면이 보이지 않으면 경영지원팀(관리자)에 문의해 권한을 확인해 주세요.
> - 거래처 포털 사용자는 **자기 회사 데이터만** 볼 수 있습니다. 다른 거래처 정보는 보이지 않으니 안심하고 사용하셔도 됩니다.

## 1. 경영지원 포털 사용법

![경영지원 포털 대시보드 화면](qa-test-guide/images/admin-dashboard.png)

이 매뉴얼은 알티바이오 **경영지원 포털**을 처음 사용하시는 분을 위해 만들어졌습니다. 매출장 조회부터 거래명세서 발급, 수금 등록, 미수금 관리, 보고서 작성까지 — 경영지원팀이 하루에 하는 일을 화면 순서대로, 이야기처럼 따라 할 수 있도록 안내합니다.

### 시작하기 — 로그인과 화면 구성

웹 브라우저(크롬 권장) 주소창에 **http://localhost:3000/admin** 을 입력하면 로그인 화면이 나타납니다. 아이디 칸에 `admin@rtbio.com`, 비밀번호 칸에 **관리자가 안내한 비밀번호**를 입력하고 로그인하시면 됩니다.

로그인하면 화면은 크게 두 부분으로 나뉩니다.

- **왼쪽 사이드바**: 모든 메뉴가 세로로 정리되어 있습니다. 위에서부터 `주요 업무`(대시보드·매입매출장·거래처원장·마감원장·매출 보고서), `정산`(거래명세서·수금관리·미수금관리), `기준정보`(거래처관리·직원 관리), `분석·도구`(품질 보고서 작성·데이터 탐색기), `품질·자료`(공지사항·UDI 공급내역 보고·매뉴얼·양식), `설정`(시스템설정) 순서로 묶여 있습니다. 메뉴 이름을 한 번 클릭하면 오른쪽 화면이 그 메뉴로 바뀝니다.
- **사이드바 상단 사용자 영역**: 본인 이름과 직책(예: "김소영 / 경영지원팀 팀장")이 보이고, 그 아래 **🔑 비밀번호 변경**과 **↩ 로그아웃** 링크가 있습니다. 비밀번호를 바꾸고 싶을 때는 "비밀번호 변경"을 누르면 현재 비밀번호와 새 비밀번호를 입력하는 작은 창이 뜹니다.

> 팁: 일부 메뉴(직원 관리)는 팀관리자/관리자 권한이 있는 분에게만 보입니다. 메뉴가 안 보인다면 권한 문제일 수 있으니 관리자에게 문의하세요.

이제 메뉴를 위에서부터 하나씩 따라가 보겠습니다.

---

### 1.1 대시보드

가장 먼저 만나는 화면입니다. 회사의 핵심 숫자(매출, 미수금, 진행 중인 주문 등)를 **위젯(작은 카드)** 형태로 한눈에 보여주는 곳입니다.

**화면 구성**
- 상단 왼쪽에 "경영지원 대시보드" 제목과 그 옆 **⋮(더보기) 버튼**이 있습니다.
- 상단 오른쪽에는 **기간 선택 드롭다운**(오늘·최근 7일·최근 30일·이번 달·커스텀)과 **➕ 위젯 추가** 버튼이 있습니다.
- 그 아래 넓은 영역이 위젯들이 놓이는 보드입니다.

**실제로 해보기 — 기간 바꿔 보기**
화면 오른쪽 위 "기간" 드롭다운을 눌러 **이번 달**을 선택해 보세요. 그러면 모든 위젯의 숫자가 이번 달 기준으로 다시 계산됩니다. **커스텀**을 고르면 옆에 시작일·종료일 날짜 입력칸이 나타나, 원하는 기간을 직접 지정할 수 있습니다.

**실제로 해보기 — 위젯 추가하기**
회사 매출 추이를 보드에 올리고 싶다면 오른쪽 위 **➕ 위젯 추가** 버튼을 누르세요. "위젯 추가" 창이 열립니다.
- 창 위쪽 **🤖 AI에게 말하기** 영역에 "이번 달 매출 보여줘" 처럼 자연어로 입력하면 AI가 알맞은 위젯을 추천해 줍니다.
- 그 아래 **갤러리에서 선택** 영역에는 미리 준비된 위젯 카드들이 있습니다. 원하는 카드를 클릭하면 곧바로 보드에 추가됩니다.
- 직접 조건을 정해 만들고 싶다면 **+ 직접 만들기** 버튼을 누르세요. "위젯 직접 만들기" 창에서 **위젯 제목**, **데이터 소스**(어떤 데이터를 볼지), **차트 종류**, **측정값(집계)**, **분류(그룹)**, **필터 조건**, **정렬 기준/최대 행**을 차례로 고르면 오른쪽 "미리보기"에 실제 데이터가 표시됩니다. 마음에 들면 아래 **저장**을 누릅니다.

**실제로 해보기 — 위젯 수정·삭제**
보드에 놓인 위젯 위에 마우스를 올리면 나타나는 메뉴로 **✏ 위젯 수정**, **복제**, **새로고침**, **삭제**를 할 수 있습니다. 삭제는 한 번 누르면 보드에서 사라지니 주의하세요.

**더보기(⋮) 메뉴**
제목 옆 ⋮ 버튼을 누르면 **대시보드 내보내기**(현재 구성 저장), **대시보드 가져오기**(저장한 구성 불러오기), **기본 레이아웃으로 초기화**(처음 상태로 되돌리기)를 할 수 있습니다.

> 주의: "기본 레이아웃으로 초기화"를 누르면 지금까지 배치한 위젯이 모두 사라지고 기본 구성으로 돌아갑니다.

대시보드로 전체 흐름을 파악했다면, 이제 실제 거래 내역을 보는 **매입매출장**으로 가보겠습니다.

---

### 1.2 매입매출장

회사의 **매출 거래 하나하나(매출장)와 매입 거래(매입장)**를 표로 조회하는 장부 화면입니다. 사이드바 `주요 업무` 아래 "매입매출장"을 누르면 들어갑니다.

**화면 구성**
- 상단에 **매출장 / 매입장** 두 개의 탭이 있습니다.
- 그 아래 필터 줄: **시작일·종료일** 날짜, **거래처** 선택, **담당자** 선택, **검색**(적요/품목 입력칸), **조회** 버튼.
- 그 아래 거래 내역 표와 맨 아래 페이지 이동 버튼, **엑셀 다운로드** 버튼이 있습니다.

**실제로 해보기**
기본으로 **매출장** 탭이 열려 있습니다. 특정 기간의 매출만 보고 싶다면 시작일·종료일을 정하고 **조회**를 누르세요. 특정 거래처만 보려면 "거래처" 드롭다운에서 회사를 고르고, 특정 영업담당자 건만 보려면 "담당자"를 고릅니다. 품목 이름이나 적요로 찾고 싶을 때는 "검색" 칸에 키워드를 입력하면 입력하는 즉시 표가 걸러집니다.

매출장 표에는 일자·거래처·담당자·품목·상태(접수/확정/출고중/출고완료 등 색깔 배지)·수량·단가·공급가액·세액·합계가 나오고, 맨 오른쪽 **관리** 칸으로 마감 전 발주 수정이나 마감 후 반품 처리를 할 수 있습니다. **매입장** 탭을 누르면 매입 거래로 표가 바뀝니다.

표 아래 **엑셀 다운로드** 버튼을 누르면 현재 조회된 내용을 엑셀 파일로 받을 수 있습니다.

> 팁: 사이드바 "매입매출장" 메뉴 오른쪽에 숫자 배지가 보이면, 처리 대기 중인 건이 있다는 표시입니다.

거래 내역을 확인했으니, 이제 특정 거래처의 잔액 흐름을 보는 **거래처원장**으로 넘어가겠습니다.

---

### 1.3 거래처원장

한 거래처의 **매출(차변)과 수금(대변)이 시간 순으로 어떻게 쌓이고 잔액이 얼마인지** 보는 화면입니다.

**화면 구성**
- 필터 줄: **거래처 검색**(이름/코드 입력), **시작일·종료일**, **담당자** 선택.
- 그 아래 요약 카드들, 그리고 일자·구분·적요·차변(매출)·대변(수금)·잔액 컬럼의 원장 표.
- 표 아래 페이지 이동 버튼과 **인쇄**, **엑셀 다운로드** 버튼.

**실제로 해보기**
"거래처 검색" 칸에 회사 이름이나 코드 일부를 입력하면 아래로 후보 목록이 펼쳐집니다. 원하는 거래처를 클릭하면 그 거래처의 원장이 표시됩니다. 기간을 좁히고 싶으면 시작일·종료일을 지정하세요(날짜를 바꾸면 자동으로 다시 조회됩니다). 표를 종이로 남기려면 **인쇄**, 파일로 받으려면 **엑셀 다운로드**를 누릅니다.

거래처별 잔액을 봤다면, 이제 한 달 전체를 마감하는 **마감원장**으로 가보겠습니다.

---

### 1.4 마감원장

**기간(보통 한 달)을 기준으로 모든 거래처의 정산을 한 표에 모아** 보고, 그 달을 "마감 확정"하는 화면입니다.

**화면 구성**
- 필터 줄: **시작일·종료일**, **정렬**(거래처명순·미수금 높은순·미수금 낮은순·매출 높은순), **조회** 버튼, **마감 확정** 버튼.
- 요약 카드들, 그리고 거래처·전월이월·당월매출·수금액·미수잔액·비고 컬럼의 표.
- 표 아래 페이지 이동 버튼과 **PDF 다운로드**, **인쇄** 버튼.

**실제로 해보기**
기간과 정렬 방식을 정하고 **조회**를 누르면 표가 채워집니다. 표 머리글의 "거래처 ↕"나 "미수잔액 ↕"을 클릭하면 그 기준으로 정렬을 바꿀 수 있습니다.

한 달 정산이 끝나 더 이상 숫자가 바뀌지 않을 때 **마감 확정**을 누릅니다. "○○○ ~ ○○○ 기간 마감을 확정하시겠습니까?"라는 확인 창이 뜨고, 확인하면 마감됩니다. 표를 보고서로 남기려면 **PDF 다운로드**나 **인쇄**를 사용하세요.

> 주의: 마감을 확정한 뒤에는 그 기간의 숫자를 수정할 수 없습니다. 모든 수금·매출이 반영됐는지 꼭 확인한 뒤 확정하세요.

마감까지 마쳤다면, 이제 경영진에게 보낼 **매출 보고서**를 만들어 보겠습니다.

---

### 1.5 매출 보고서

선택한 기간의 매출을 **공문(보고서) 형태로 자동 정리**해 주는 화면입니다. 사이드바의 "매출 보고서"를 누르면 들어갑니다.

**화면 구성**
- 필터 줄: **시작일·종료일**, **거래처 유형**(전체·대리점·병원·기타), **담당자**, **조회** 버튼.
- 그 아래 **빠른 월 선택** 버튼들(1월~12월).
- 가운데에 공문 형태의 보고서 본문이 나타납니다.

**실제로 해보기**
가장 간단한 방법은 화면 중간의 **빠른 월 선택**에서 원하는 월 버튼을 누르는 것입니다. 그러면 그 달의 매출 보고서가 바로 만들어집니다. 좀 더 세밀하게 보려면 위쪽 필터에서 기간·거래처 유형·담당자를 정한 뒤 **조회**를 누르세요. 보고서에는 거래처별·제품군별 수량과 공급가, 부가세 등이 표 형태로 정리되어 나옵니다.

매출 흐름을 보고서로 정리했다면, 이제 정산 단계인 **거래명세서**로 넘어가겠습니다.

---

### 1.6 거래명세서

거래처에 발급하는 **거래명세서(세금계산서 전 단계의 거래 내역서)를 만들고, 발행/발송 이력을 관리**하는 화면입니다. 사이드바 `정산` 그룹의 "거래명세서"를 누릅니다.

**화면 구성**
- 위쪽 폼: **거래처 검색/선택**, **시작일·종료일**, **담당자 검색**, **명세서 생성** 버튼.
- 가운데 명세서 미리보기 영역.
- 아래쪽 **발행 이력** 카드(상태 필터 + 이력 표).

**실제로 해보기 — 명세서 만들기**
"거래처 검색/선택" 칸에 거래처 이름을 입력하면 후보가 펼쳐집니다. 거래처를 고르고, 필요하면 기간(시작일·종료일)을 정한 뒤 **명세서 생성** 버튼을 누르세요. 그러면 가운데에 "거 래 명 세 서" 양식이 나타납니다. 공급자(알티바이오)·공급받는자 정보, 전월이월·당월매출·수금액·미수잔액 요약, 품목별 일자/수량/단가/금액, 그리고 공급가액·부가세(10%)·합계가 자동 계산되어 표시됩니다. 미리보기 하단의 **인쇄**, **PDF 저장** 버튼으로 출력할 수 있습니다.

**실제로 해보기 — 발행/발송 관리**
화면 맨 아래 **발행 이력** 카드에는 지금까지 만든 명세서들이 표로 정리됩니다. 위쪽 상태 필터(전체·미발송·발송완료·취소)로 원하는 상태만 골라 볼 수 있습니다. 각 줄의 액션 칸에서:
- **재발행**: 같은 명세서를 다시 발행합니다(발행 횟수가 1 늘어납니다).
- **발송**: 거래처에 발송 완료로 표시합니다. 확인 창이 뜨고 확인하면 "✓ 발송완료"로 바뀌고 발송 일시가 기록됩니다. 이미 발송한 건은 **재발송**으로 표시됩니다.
- 발행/발송 횟수가 2회 이상인 줄에는 **이력 보기** 링크가 생겨, 언제 누가 발행/발송했는지 확인할 수 있습니다.

> 팁: 발주 상세 화면(1.13 발주관리)에서 "거래명세서 출력" 버튼을 누르면 이 화면으로 이동하면서 해당 거래처가 자동 선택됩니다.

명세서를 발급했으니, 이제 들어온 돈을 기록하는 **수금관리**로 가보겠습니다.

---

### 1.7 수금관리

거래처에서 **입금된 금액을 직접 입력해 등록**하고, 최근 등록 내역과 미수금 현황을 보는 화면입니다.

**화면 구성**
- 상단 요약 카드들(수금 관련 통계).
- "수금 규칙" 안내 박스.
- **은행 입금 수기 등록** 표(거래처·은행·입금자명·입금액·일자·참조/적요·상태 컬럼) + **+ 행 추가**, **입금 등록** 버튼.
- **최근 등록 내역**(최대 10건) 표.
- 대리점별 미수금, 미수금 Aging(연체 기간별) 패널과 **엑셀 다운로드** 버튼.

**실제로 해보기 — 입금 등록**
은행 통장에 찍힌 입금을 기록해 보겠습니다. **은행 입금 수기 등록** 표의 한 줄에서 거래처를 고르고, 입금액과 일자, 필요하면 은행·입금자명·적요를 입력합니다. 여러 건을 한 번에 넣으려면 **+ 행 추가**를 눌러 줄을 늘리세요. 다 입력했으면 **입금 등록** 버튼을 누릅니다. 거래처·금액·일자가 모두 채워진 줄만 등록되며("거래처/금액/일자 필수"), 등록되면 아래 **최근 등록 내역**에 즉시 나타납니다.

> 주의: 입금액 칸에는 숫자만 입력하세요. 거래처·금액·일자 중 하나라도 비어 있으면 그 줄은 등록되지 않습니다.

수금 화면 아래에는 미수금 요약도 함께 보이지만, 미수만 깊이 분석하려면 안내 문구의 링크나 사이드바를 통해 **미수금관리**로 이동하면 됩니다.

---

### 1.8 미수금관리

수많은 거래처 중 **미수금이 남아 있는 곳만 따로 모아 보고**, 한 거래처를 골라 **월별 매출/입금/미수와 상세 거래내역**까지 분석하는 화면입니다.

**화면 구성**
- 상단 전체 미수 KPI 카드들.
- **거래처 검색** 카드: 거래처명/코드 입력칸, **유형 필터**(전체·대리점·병원), **정렬**(미수금 높은순·연체 오래된순·거래처명순).
- 미수 거래처 목록.
- 거래처를 고르면 아래에 **월별 매출/입금/미수금** 표와 **상세 거래내역** 표가 펼쳐집니다(연도 선택 가능).

**실제로 해보기**
먼저 위쪽 카드로 전체 미수 규모를 확인합니다. 그다음 정렬을 "미수금 높은순"이나 "연체 오래된순"으로 바꾸면 급한 거래처가 위로 올라옵니다. 특정 거래처를 깊이 보려면 "거래처명/코드" 칸에 이름을 입력해 후보에서 선택하세요. 화면 아래쪽에 그 거래처의 월별 매출·입금·미수와 누적 잔액, 그리고 일자별 상세 거래내역이 나타납니다. 오른쪽 위 연도 드롭다운(2026·2025·…)으로 다른 해의 기록도 볼 수 있습니다.

> 참고: 여기서 보이는 미수금은 마감원장(1.4)의 잔액을 기준으로 합니다. 두 화면의 숫자가 항상 일치하도록 설계되어 있습니다.

정산 업무를 마쳤다면, 이제 기준이 되는 정보인 **거래처관리**로 넘어가겠습니다.

---

### 1.9 거래처관리

거래처(대리점·병원 등)의 **정보를 등록·수정하고, 단가·할인·배송지를 관리**하는 핵심 기준정보 화면입니다. 사이드바 `기준정보`의 "거래처관리"를 누릅니다.

**화면 구성**
- 검색 줄: **거래처명 검색**, **유형 필터**(전체·대리점·병원·기타), **+ 신규 거래처 등록** 버튼.
- 그 아래 거래처들이 카드 형태로 나열됩니다. 카드마다 담당자·영업담당·연락처·이메일·주소·결제방식·할인율·고정단가가 보이고, 하단에 **수정 / 할인 매트릭스 / 품목별 할인 / 상세보기** 버튼이 있습니다.

**실제로 해보기 — 새 거래처 등록**
신규 거래처를 등록해 보겠습니다. 오른쪽 위 **+ 신규 거래처 등록**을 누르면 입력 창이 열립니다. **업체명(필수)**, 유형, 담당자, 연락처, 이메일, 주소, 결제방식·마감기간, 영업담당자, 카테고리별 할인율(무릎·상지·하지·스프린트)을 채우고 저장 버튼을 누르세요. 업체명이 비어 있으면 "업체명은 필수입니다" 안내가 뜹니다. 저장에 성공하면 "거래처가 등록되었습니다" 메시지와 함께 카드 목록에 새로 나타납니다.

**실제로 해보기 — 단가·할인 설정**
거래처를 등록했으니 그 거래처의 단가를 정해 보겠습니다. 카드 하단 버튼을 활용하세요.
- **수정**: 위에서 입력한 기본 정보와 카테고리 할인율을 다시 편집합니다.
- **할인 매트릭스**: 모델별(리코탭·스프린트·실린더·바로웰핏·알티네오 등) 할인율을 표로 정해, MSRP에 대한 공급가를 한 번에 설정합니다.
- **품목별 할인**: 특정 제품에 고정 단가를 지정합니다.
- **상세보기**: 그 거래처의 모든 정보(할인율 매트릭스, 배송지, 거래 현황)를 한 화면에서 봅니다.

**실제로 해보기 — 배송지 관리**
**상세보기**를 열면 아래쪽에 **배송지 관리** 영역이 있습니다. **+ 배송지 추가**로 새 배송지를 등록하고, 각 배송지 줄의 **수정** 버튼으로 내용을 고칠 수 있습니다. 기본 배송지가 아닌 줄에는 **기본으로** 버튼이 있어, 누르면 그 주소가 기본 배송지가 됩니다.

> 참고: 거래처당 기본 배송지는 1개만 지정됩니다. "기본으로"를 누르면 이전 기본 배송지는 자동으로 해제됩니다. 화면에 보이는 "유형 추가" 같은 일부 기능은 현재 비활성화되어 있을 수 있습니다.

거래처 정보를 정리했다면, 직원 계정을 다루는 **직원 관리**로 가보겠습니다. (이 메뉴는 관리자 권한이 있어야 보입니다.)

---

### 1.10 직원 관리

회사 **직원 계정을 조회·생성하고, 직급·비밀번호를 관리**하는 화면입니다. 팀관리자/관리자에게만 사이드바에 표시됩니다.

**화면 구성**
- 검색 줄: **이름/이메일 검색**, **직급 필터**, **상태 필터**(활성·전체·비활성), **+ 신규 직원** 버튼, (관리자에게만) **⚙ 부서·직급 관리** 버튼.
- 그 아래 직원 목록 표(이름·이메일·권한·부서·직급·상태·액션).

**실제로 해보기**
새 직원을 추가하려면 **+ 신규 직원**을 누르고, 이름·이메일·권한·부서·직급 등을 입력해 저장합니다. 기존 직원 줄의 액션 버튼으로는 **수정**(정보 변경), **비밀번호 재발급**, **비활성화**를 할 수 있습니다. 이미 비활성화된 직원은 **재활성화** 버튼으로 다시 사용 가능 상태로 되돌립니다. 직원이 많을 때는 위쪽 검색·직급·상태 필터로 좁혀서 찾으세요.

관리자라면 **⚙ 부서·직급 관리** 버튼으로 회사의 부서/직급 목록 자체를 추가·삭제할 수 있습니다.

> 주의: 부여할 수 있는 직급은 본인 권한에 따라 제한됩니다. 본인보다 높은 권한은 지정할 수 없습니다.

직원 계정을 정리했다면, 이제 품질 문서를 다루는 **품질 보고서 작성**으로 넘어가겠습니다.

---

### 1.11 품질 보고서 작성

알티바이오 **ISO 13485 품질양식을 AI 도움을 받아 채우고 PDF로 출력**하는 화면입니다. 사이드바 `분석·도구`의 "품질 보고서 작성"을 누릅니다.

**화면 구성**
- 화면은 좌우로 나뉩니다. **왼쪽**은 양식 영역(양식 선택 드롭다운 + 양식 미리보기), **오른쪽**은 **🤖 AI 어시스턴트** 채팅 영역입니다.
- 왼쪽 아래에 **임시저장 / 양식대로 인쇄 / PDF 출력** 버튼이 있습니다.

**실제로 해보기**
먼저 왼쪽 위 드롭다운에서 작성할 양식(예: "주문접수 및 검토대장", "발주서" 등)을 고릅니다. 양식이 미리보기로 나타나면, 오른쪽 AI 어시스턴트 입력칸에 자연어로 상황을 말해 보세요. 예: "메디팜 의료기에서 리코탭플러스 50개 주문 들어왔어". AI가 내용을 이해해 양식의 빈칸을 자동으로 채워 줍니다. 입력창 아래에는 자주 쓰는 문장(추천 버튼)도 제공됩니다.

작성이 끝나면 왼쪽 아래에서 **임시저장**으로 잠시 저장하거나, **양식대로 인쇄** 또는 **PDF 출력**으로 문서를 완성합니다.

품질 문서를 다뤘으니, 이제 원본 데이터를 직접 들여다보는 **데이터 탐색기**로 가보겠습니다.

---

### 1.12 데이터 탐색기

ERP에 쌓인 **원본 데이터(거래처·제품·주문·재고 등)를 표로 직접 조회·필터·편집하고 CSV/엑셀로 내보내는** 고급 도구 화면입니다.

**화면 구성**
- 상단 도구 줄: **테이블 선택 드롭다운**(권한에 따라 볼 수 있는 표 목록), 표 제목, 그리고 새 행 추가 등 액션 버튼.
- 그 아래 필터 바, (입출고 표일 때) 합계 카드, 데이터 그리드, 페이지 이동 버튼.
- 관리자라면 화면 아래쪽에 **전체 테이블** 영역이 추가로 보입니다(설정성 4개 테이블은 직접 편집 가능).

**실제로 해보기**
위쪽 드롭다운에서 보고 싶은 표(예: 거래처, 제품, 재고)를 고르면 그 데이터가 그리드에 나타납니다. 필터 바와 검색으로 원하는 행만 추리고, 컬럼 머리글을 클릭해 정렬할 수 있습니다. 행을 클릭하면 오른쪽에서 그 행을 편집하거나 이력을 볼 수 있고, 새 행 추가·삭제·복제도 가능합니다. 화면에 보이는 그대로(필터 적용 상태)를 **CSV/엑셀로 내보내기**할 수 있습니다.

> 주의: 데이터 탐색기는 원본 데이터를 직접 수정할 수 있는 강력한 도구입니다. 편집은 신중하게 하고, 모든 변경은 감사 기록으로 남습니다.

원본 데이터를 확인했으니, 이제 거래처에 소식을 알리는 **공지사항**으로 넘어가겠습니다.

---

### 1.13 공지사항

거래처나 내부에 보낼 **공문/공지를 작성하고 발송 이력을 관리**하는 화면입니다. 사이드바 `품질·자료`의 "공지사항"을 누릅니다.

**화면 구성**
- 오른쪽 위 **＋ 공지 작성** 버튼.
- 필터 줄: **검색**(제목/본문), **대상**(전체·전체 거래처·대리점만·병원만·특정 업체), **긴급도**(전체·긴급·일반), **작성자**(팀별).
- 그 아래 공지 카드 목록.

**실제로 해보기 — 공지 작성**
**＋ 공지 작성**을 누르면 작성 창이 열립니다.
- **제목(필수)**, **긴급도**(일반/긴급)를 정하고, **본문(필수)**을 입력합니다.
- **발송 대상**을 고릅니다: 전체 거래처, 대리점만, 병원만, 또는 **특정 업체**. "특정 업체"를 고르면 아래에 업체 검색·체크박스 목록이 나타나, 보낼 회사를 하나하나(또는 "검색결과 전체선택"으로 한 번에) 선택합니다.
- 필요하면 **만료일**을 정하고, **상단 고정(📌)**에 체크하면 목록 맨 위에 고정됩니다.
- 작성자는 본인 팀(예: 경영지원팀)으로 자동 설정됩니다.

제목과 본문이 비어 있거나, "특정 업체"인데 한 곳도 고르지 않으면 발송되지 않으니 주의하세요. 발송한 공지는 카드 목록에 나타나며, 카드에서 **편집**과 **삭제**를 할 수 있습니다.

> 주의: "편집"과 "삭제"는 별개 버튼입니다. 삭제는 되돌릴 수 없으니 확인하고 진행하세요.

공지를 보냈으니, 이제 규제 보고인 **UDI 공급내역 보고**로 가보겠습니다.

---

### 1.14 UDI 공급내역 보고

병원에 납품한 의료기기 공급 내역을 **의료기기통합정보시스템(UDI)에 월 단위로 보고**하는 화면입니다.

**화면 구성**
- 안내 배너(보고기한·대상 설명).
- 필터 줄: **보고 월** 선택, **보고 상태**(전체·미보고만·보고완료만), **조회** 버튼, **UDI 전송** 버튼.
- 요약 카드들, **월간 보고 이력** 표, **선택 월 공급 내역**(병원 납품분) 표.

**실제로 해보기**
위쪽에서 보고할 **월**을 고르고 **조회**를 누르면, 그 달에 병원에 납품한 공급 내역(의료기관·사업자번호·제품명·품목코드(UDI-DI)·수량·금액)이 표로 정리됩니다. 내용을 확인한 뒤 **UDI 전송** 버튼을 누르면 "○○월 분 UDI 공급내역 보고를 전송하시겠습니까?" 확인 창이 뜨고, 확인하면 시스템에 전송되어 접수번호가 발급됩니다. 전송 결과는 **월간 보고 이력** 표에서 확인할 수 있습니다.

> 참고: 보고 대상은 병원(의료기관) 공급분만이며, 보고 기한은 공급한 달의 다음 달 말일입니다.

규제 보고를 마쳤으니, 사내 문서를 찾는 **매뉴얼·양식**으로 넘어가겠습니다.

---

### 1.15 매뉴얼 · 양식

ISO 13485 **품질 매뉴얼·절차서·양식을 검색해 찾아보는** 자료실 화면입니다. 사이드바의 "매뉴얼 · 양식"을 누릅니다.

**화면 구성**
- 필터 줄: **검색**(문서명/코드), **분류**(전체·매뉴얼·절차서·양식).
- **🤖 매뉴얼 빠른 검색** 박스(키워드 입력 + 검색 버튼).
- 그 아래 문서 목록.

**실제로 해보기**
찾는 문서가 있으면 위쪽 검색칸에 문서명이나 코드를 입력하고, 분류 드롭다운으로 매뉴얼/절차서/양식 중 하나만 추릴 수 있습니다. 어떤 절차인지 잘 모를 때는 보라색 **🤖 매뉴얼 빠른 검색** 박스에 "고객불만 처리 절차"처럼 키워드를 넣고 **검색**을 누르면, 관련 문서를 찾아 답해 줍니다. 본격적인 대화형 질문은 화면 오른쪽 아래의 어시스턴트 버튼을 이용하라는 안내도 함께 표시됩니다.

자료를 찾았다면, 마지막으로 시스템 환경을 다루는 **시스템설정**으로 가보겠습니다.

---

### 1.16 시스템설정

회사 운영의 **기본값(업무 시간·재고 기준·회사 정보·이메일·공급업체 등)을 설정**하는 화면입니다. 사이드바 `설정`의 "시스템설정"을 누릅니다.

**화면 구성**
- 위쪽 탭: **⏰ 기본 설정**, **📦 재고 설정**, **🏢 회사 정보**, **✉️ 이메일**, **🤝 공급업체**.
- 선택한 탭에 해당하는 설정 입력 영역.

**실제로 해보기**
바꾸려는 설정에 해당하는 탭을 누릅니다. 예를 들어 **⏰ 기본 설정** 탭에서는 업무 시작/종료 시간 같은 값을, **📦 재고 설정**에서는 재고 부족 기준 등을 조정합니다. **🏢 회사 정보**는 명세서에 찍히는 회사 주소·사업자번호 등을, **✉️ 이메일**은 발송 계정 정보를, **🤝 공급업체**는 매입 거래처를 관리합니다. 값을 입력한 뒤 각 탭의 저장 버튼으로 반영하면 됩니다.

> 참고: 시스템설정은 품질관리(QC) 포털의 설정과 연동되어 있어, 한쪽에서 바꾼 값이 양쪽에 함께 적용됩니다. 이메일 발송 정보처럼 회사 전체에 영향을 주는 값은 신중히 변경하세요.

---

### 1.17 발주관리 (참고 화면)

발주(주문) 전체 현황을 조회하는 화면입니다. 사이드바에 직접 메뉴로 노출되지는 않지만, 다른 화면(예: 매입매출장의 "발주관리 이동" 버튼)에서 이동할 수 있습니다.

**화면 구성**
- 상태 탭: **전체·접수·확정·출고중·완료**.
- 필터 줄: **거래처** 선택, 기간 표시.
- 발주 표(발주번호·거래처·발주일·배송·금액·상태·담당자).

**실제로 해보기**
위쪽 상태 탭을 눌러 원하는 단계의 주문만 볼 수 있습니다(예: "확정"을 누르면 확정된 주문만 표시). 표의 한 줄을 클릭하면 그 발주의 상세(품목·수량·단가·합계)가 창으로 열리고, 거기서 **거래명세서 출력**(거래명세서 화면으로 이동) 또는 **발주서 인쇄**를 할 수 있습니다.

> 도메인 흐름 참고: 발주는 접수(DRAFT/SUBMITTED) → 확정(CONFIRMED, 가용재고 예약) → 출고중(SHIPPING) → 출고완료(COMPLETED, 실물재고 차감) 순서로 진행됩니다. 출고가 완료되면 거래명세서를 발급하고, 수금을 등록하면 거래처원장과 마감원장에 자동 반영됩니다. 단가는 발주 시점 기준으로 고정(스냅샷) 저장되어, 이후 가격이 바뀌어도 과거 주문 금액은 변하지 않습니다.

---

이상으로 경영지원 포털의 모든 화면을 살펴보았습니다. 하루 업무는 보통 **대시보드로 현황 파악 → 매입매출장/원장으로 거래 확인 → 마감원장으로 한 달 마감 → 거래명세서 발급 → 수금 등록 → 미수금 관리** 흐름으로 이어집니다. 처음에는 순서대로 따라 하시고, 익숙해지면 필요한 메뉴로 바로 이동해 사용하시면 됩니다.

---

## 2. 영업 포털 사용법

![영업 포털 대시보드 화면](qa-test-guide/images/exec-dashboard.png)

이 장은 RTBIO ERP의 **영업 포털**(영업팀 전용 화면)을 처음 쓰시는 분을 위한 사용 설명서입니다. 거래처를 관리하고, 매출 현황을 살펴보고, 담당자를 배정하고, 학회 방명록을 입력하고, 사용량과 보고서를 작성하는 일상 업무를 화면 순서대로 따라 하실 수 있도록 안내합니다.

### 들어가기 전에 — 로그인과 화면 구조

웹 브라우저(크롬 권장) 주소창에 **http://localhost:3000/exec** 를 입력해 접속합니다. 로그인 화면이 나오면 영업팀 계정(예: `sales1@rtbio.com`)과 **관리자가 안내한 비밀번호**를 입력하고 들어오시면 됩니다.

로그인하면 화면은 크게 두 영역으로 나뉩니다.

- **왼쪽 사이드바**: 위쪽에 로고와 내 이름(`김영업` · 영업팀)이 보이고, 그 아래에 메뉴가 세로로 나열됩니다. 메뉴는 "영업" 묶음과 "기타" 묶음으로 나뉘어 있습니다.
- **오른쪽 본문**: 선택한 메뉴의 내용이 표시되는 넓은 작업 공간입니다.

사이드바 메뉴를 클릭하면 오른쪽 본문이 해당 화면으로 바뀝니다. 지금 보고 있는 메뉴는 파란색으로 강조됩니다.

사이드바 내 이름 바로 아래에는 작은 글씨로 두 개의 링크가 있습니다.

- **🔑 비밀번호 변경**: 내 로그인 비밀번호를 바꾸는 작은 창을 엽니다. 현재 비밀번호와 새 비밀번호를 입력해 변경합니다.
- **↩ 로그아웃**: 포털에서 나갑니다. 공용 PC를 쓰신다면 자리를 비울 때 꼭 눌러 주세요.

사이드바 맨 아래에는 **모드** 드롭다운이 있습니다. 여기서 "관리자 (팀장) / 박진우 (팀장) / 신현호 (주임) / 이경동 (사원)" 중 하나를 고르면, 그 사람의 시야로 화면이 바뀝니다. **관리자(팀장)**를 고르면 모든 담당자의 거래처와 실적이 전부 보이고, 특정 사원을 고르면 그 사원이 담당하는 거래처와 실적만 보입니다. 팀장은 전체를 보고, 사원은 자기 것만 보는 구조라고 생각하시면 됩니다.

> 팁: 모드를 바꾸면 화면 우측 하단에 "모드 전환: ○○○" 같은 작은 알림(토스트)이 잠깐 떴다 사라집니다. 이 토스트는 저장·삭제·제출 등 거의 모든 동작 직후에 결과를 알려 주므로, 동작이 제대로 됐는지 확인하는 신호로 활용하세요.

그러면 사이드바 메뉴 순서대로 화면을 하나씩 살펴보겠습니다.

---

### 2.1 영업 대시보드

가장 먼저 보이는 첫 화면입니다. 우리 팀의 이번 달 영업 성과를 한눈에 요약해 주고, 원하는 정보 위젯을 직접 골라 배치할 수 있는 **나만의 현황판**입니다.

**화면 구성**

- 맨 위에 **"영업 대시보드"** 제목이 있고, 그 옆에 점 세 개 모양의 **⋮ 더보기 버튼**, 오른쪽 끝에 **➕ 위젯 추가** 버튼이 있습니다.
- 그 아래 가로로 **4장의 큰 숫자 카드(KPI)**가 놓여 있습니다.
  - **월 매출 현황**: 이번 달 발행된 거래명세서 합계 금액과 기준 월(예: 2026-04 누적).
  - **월 수금액 현황**: 이번 달 실제로 받은 돈의 합계.
  - **월 미수금 현황**: 아직 못 받은 돈의 합계와, 미수금이 있는 거래처 개수.
  - **담당 거래처**: 활성 거래처 총 개수와 대리점/병원 분포.
- 그 아래 넓은 영역이 **위젯 격자판(그리드)**입니다. 여기에 매출 차트, 거래처 순위표 같은 위젯들이 카드 형태로 놓입니다.

**위젯을 추가해 보겠습니다**

오른쪽 위 **➕ 위젯 추가** 버튼을 누르면 "위젯 추가" 창이 열립니다. 이 창은 두 부분으로 되어 있습니다.

1. **🤖 AI에게 말하기**: 위쪽 채팅 칸에 "이번 달 거래처별 매출 보여줘" 처럼 평소 말로 입력하면, 그에 맞는 위젯을 추천해 줍니다(AI 연동이 켜진 환경에서 동작).
2. **갤러리에서 선택**: 아래쪽에 미리 만들어 둔 위젯들이 카드로 나열됩니다. 원하는 카드를 클릭하면 대시보드에 바로 추가됩니다.

갤러리 영역 오른쪽 위의 **+ 직접 만들기** 버튼을 누르면 "위젯 직접 만들기" 창이 열려, 원하는 위젯을 처음부터 구성할 수 있습니다. 이 창에서 채우는 항목은 다음과 같습니다.

- **위젯 제목**: 위젯에 표시될 이름(예: "이번 달 매출").
- **데이터 소스**: 어떤 데이터를 쓸지(주문, 거래처 등).
- **차트 종류**: 막대·표 등 어떤 모양으로 보여줄지.
- **측정값(집계)**: 무엇을 합산·평균낼지(합계/개수 등 + 대상 항목).
- **분류(그룹)**: 어떤 기준으로 묶을지(거래처별, 제품별 등).
- **필터 조건**: **+ 조건** 버튼으로 "어떤 행만 볼지" 조건을 추가합니다.
- **정렬 기준 / 정렬 / 최대 행**: 큰 값부터(내림차순)인지 작은 값부터(오름차순)인지, 몇 줄까지 보여줄지.

설정하는 동안 오른쪽 **미리보기** 영역에 실제 데이터가 즉시 그려집니다. 마음에 들면 아래 **저장**을, 그만두려면 **취소**를 누릅니다.

**만든 위젯을 정리해 보겠습니다**

대시보드에 놓인 위젯은 **마우스로 끌어(드래그)** 위치를 옮기거나 크기를 조절할 수 있습니다. 각 위젯에 마우스를 올리면 점 세 개 또는 우클릭으로 작은 메뉴가 뜨는데, 여기서 다음을 할 수 있습니다.

- **✏ 위젯 수정**: 제목을 바꿉니다(구성 자체를 바꾸려면 "직접 만들기"로 새로 만들라는 안내가 함께 나옵니다).
- **복제**: 같은 위젯을 하나 더 만듭니다.
- **새로고침**: 최신 데이터로 다시 그립니다.
- **삭제**: 위젯을 대시보드에서 없앱니다.

**대시보드 전체를 관리해 보겠습니다**

제목 옆 **⋮ 더보기** 버튼을 누르면 메뉴가 펼쳐집니다.

- **대시보드 내보내기**: 지금 구성을 파일로 저장합니다(백업·이동용).
- **대시보드 가져오기**: 저장해 둔 구성 파일을 불러옵니다.
- **기본 레이아웃으로 초기화**: 내가 바꾼 배치를 모두 지우고 처음 상태로 되돌립니다.

> 주의: **기본 레이아웃으로 초기화**는 지금까지 꾸며 둔 위젯 배치를 한 번에 되돌립니다. 공들여 만든 구성이 있다면 먼저 **대시보드 내보내기**로 백업해 두시길 권합니다.

대시보드로 현황을 파악했다면, 이제 기간과 담당자별로 더 자세히 들여다보겠습니다. 왼쪽 **영업 현황** 메뉴로 이동합니다.

---

### 2.2 영업 현황

선택한 기간 동안의 매출을 **병원/대리점으로 나눠 보고, 담당자별 실적과 품목별 판매까지 파고드는** 분석 화면입니다.

**화면 구성**

- 맨 위 **"영업 현황"** 제목 아래에 회색 카드 형태의 **기간 필터 막대**가 있습니다.
  - **시작일 / 종료일**: 날짜를 직접 고릅니다(처음 들어오면 최근 7일이 기본으로 채워져 있습니다).
  - **유형** 드롭다운: 전체 / 병원만 / 대리점만 / 기타만 중에서 고릅니다.
  - **조회** 버튼: 위에서 고른 조건으로 다시 계산합니다.
  - 오른쪽 끝의 **오늘 / 이번 주 / 이번 달** 버튼: 자주 쓰는 기간을 한 번에 채워 줍니다.
- 그 아래 **4장의 KPI 카드**: 총 매출 / 병원 매출 / 대리점 매출 / 신규 거래처.
- 그 아래 두 개의 그래프 카드: 왼쪽 **병원 매출**, 오른쪽 **대리점 매출**(거래처별 막대그래프).
- 그 아래 **담당자별 매출** 표.
- 맨 아래 **품목/부위/사이즈 드릴다운** 영역.

**기간을 정해 조회해 보겠습니다**

예를 들어 이번 달 실적을 보려면, 오른쪽의 **이번 달** 버튼을 누르면 됩니다. 그러면 시작일·종료일이 이번 달로 채워지고 화면이 즉시 갱신됩니다. 특정 구간만 보려면 **시작일**과 **종료일**을 직접 고른 뒤 **조회** 버튼을 누릅니다. 병원만 따로 보고 싶다면 **유형** 드롭다운에서 "병원만"을 고르세요. 제목 바로 아래 작은 글씨에 "(시작일) ~ (종료일) · (선택한 유형)"이 표시되어, 지금 어떤 조건으로 보고 있는지 알려 줍니다.

**담당자별 실적을 보겠습니다**

화면 가운데 **담당자별 매출** 표에는 담당자마다 한 줄씩, 다음 정보가 들어 있습니다.

- **담당자 / 역할**: 이름(동그란 머리글자 아이콘)과 직급.
- **담당 거래처**: 맡고 있는 거래처 수.
- **발주 건수 / 매출액**: 기간 내 발주 건수와 매출 금액.
- **반품건수**: 반품으로 처리된 건수(있을 때만 노란 배지로 표시).
- **신규**: 새로 튼 거래처 수(초록 배지).

이 표의 **각 줄을 클릭**하면, 그 담당자를 기준으로 맨 아래 품목 드릴다운이 다시 계산됩니다. 선택된 줄은 색이 강조되고 "● 선택됨" 표시가 붙습니다. 같은 줄을 한 번 더 클릭하면 선택이 풀려 전체 기준으로 돌아갑니다.

> 팁: **모드** 드롭다운에서 특정 사원을 골라 두면, 이 표에서 그 사원 외의 다른 담당자 줄은 흐릿하게 표시되어 본인 실적에 집중할 수 있습니다.

**품목까지 파고들어 보겠습니다**

맨 아래 **품목/부위/사이즈 드릴다운**에는 브랜드(예: 리코트 플러스, 스프린트)별로 접힌 줄이 있고, 오른쪽에 그 브랜드의 총 매출이 표시됩니다. 브랜드 줄 왼쪽의 **▶ 화살표**를 누르면 줄이 펼쳐지며(▼로 바뀜), 그 안의 **부위(상지/하지/무릎 등)와 사이즈(S/M/L/XL)별 판매 수량·금액**이 표 형태로 나타납니다. 다시 누르면 접힙니다.

위에서 담당자 줄을 선택해 둔 경우, 드릴다운 위쪽에 "○○○ 담당 기준 품목 드릴다운 (담당 비중 N%)"이라는 안내 띠가 뜨고 그 담당자 기준으로 숫자가 보정됩니다. 띠 안의 **✕ 필터 해제** 버튼을 누르면 다시 전체 기준으로 돌아갑니다.

실적을 파악했으니, 실제 거래처 정보를 손볼 차례입니다. 왼쪽 **거래처 관리** 메뉴로 이동합니다.

---

### 2.3 거래처 관리

우리 거래처의 정보를 **조회·등록·수정**하고, 거래처별 **할인율·고정 단가**를 설정하며, 거래처 상세에서 **발주서·거래명세표를 출력**하는 화면입니다. 이 화면은 경영지원팀이 쓰는 화면과 동일한 형태입니다.

**화면 구성**

- 맨 위 **"거래처관리"** 제목 아래에 검색 막대가 있습니다.
  - **거래처명 검색** 입력칸: 글자를 입력하면 즉시 목록이 걸러집니다.
  - **전체 유형** 드롭다운: 전체 / 대리점 / 병원 / 기타.
  - **+ 신규 거래처 등록** 버튼(파란색).
- 그 아래 거래처들이 **카드 격자** 형태로 나열됩니다. 각 카드에는 거래처명·유형 배지, 담당자, 영업담당, 연락처, 이메일, 주소, 결제방식, 마감기간, 명세서 종류, 할인 태그, 고정단가가 표시됩니다.
- 각 카드 맨 아래에 **수정 / 할인 매트릭스 / 품목별 할인 / 상세보기** 버튼이 있습니다.

**거래처를 찾아보겠습니다**

검색 칸에 거래처 이름의 일부(예: "한빛")를 입력하면 해당 거래처 카드만 남습니다. 유형으로 추리려면 **전체 유형** 드롭다운에서 "병원" 등을 고르세요. 검색과 유형은 함께 적용되며, 위쪽에 "총 거래처 N개" 요약이 갱신됩니다.

**새 거래처를 등록해 보겠습니다**

오른쪽 **+ 신규 거래처 등록** 버튼을 누르면 등록 창이 열립니다. 거래처명·유형·담당자·연락처·주소·결제방식 등 기본 정보를 채우고 저장하면, 새 거래처 카드가 목록에 추가됩니다.

**기존 거래처를 수정·설정해 보겠습니다**

각 카드 아래 버튼의 역할은 다음과 같습니다.

- **수정**: 거래처의 기본 정보(연락처·주소·담당자 등)를 바꾸는 창을 엽니다.
- **할인 매트릭스**: 브랜드(모델)별 정가 대비 공급률(할인율)을 한 표에서 일괄 설정합니다. 각 칸에 % 값을 넣으면 공급가가 자동 계산됩니다.
- **품목별 할인**: 카테고리(무릎/상지/하지/스프린트) 기본 할인율 위에, 개별 제품마다 다른 할인율을 따로 지정합니다. 비워 두면 카테고리 기본값이 적용됩니다.
- **상세보기**: 거래처 상세 정보 창을 엽니다(아래에서 자세히 설명).

**거래처 상세를 열어 보겠습니다**

**상세보기**를 누르면 그 거래처의 종합 정보 창이 뜹니다. 담당 영업사원, 결제 조건, 미수금, 누적 매출, 의사 수, 신규 거래일, 지역·주소, 담당자 연락처가 정리되어 있고, 아래로 **취급 품목**, **품목별 판매수량(이번 달)** 표, **경쟁업체 품목(비고)** 메모칸이 이어집니다.

- **경쟁업체 품목(비고)** 칸에 메모를 적으면 거래처 정보에 함께 저장됩니다. 메모칸 밖을 클릭하거나 창 아래 **비고 저장** 버튼을 누르면 저장됩니다.
- 창 맨 아래에는 **발주서 출력**과 **거래명세표 출력** 버튼이 있습니다. 각각 새 창에 인쇄용 양식을 띄워, 그 창의 **인쇄** 버튼으로 종이 출력하거나 PDF로 저장할 수 있습니다.

> 주의: **발주서 출력·거래명세표 출력**은 새 창(팝업)으로 열립니다. 브라우저가 팝업을 막으면 "팝업을 허용해주세요" 알림이 뜨니, 주소창 옆의 팝업 차단 아이콘에서 이 사이트의 팝업을 허용해 주세요.

거래처 정보를 정리했다면, 이제 그 거래처들을 영업사원에게 나눠 맡길 차례입니다. 왼쪽 **담당자 관리** 메뉴로 이동합니다.

---

### 2.4 담당자 관리

영업사원마다 **어떤 거래처를 맡고 있는지** 배정하고 해제하는 화면입니다.

**화면 구성**

- 맨 위 **"담당자 관리"** 제목 옆에 **+ 거래처 배정** 버튼이 있습니다.
- 그 아래에 영업사원별 **카드**가 격자로 놓입니다. 각 카드에는 사원 이름·직급·담당 거래처 수가 있고, 그 아래에 담당 거래처가 한 줄씩 나열됩니다.

**거래처를 배정해 보겠습니다**

오른쪽 위 **+ 거래처 배정** 버튼(또는 각 사원 카드 안의 **+ 거래처 배정** 버튼)을 누르면 배정 창이 열립니다.

1. **담당자** 드롭다운에서 거래처를 맡길 사원을 고릅니다.
2. **거래처 선택** 드롭다운에서 배정할 거래처를 고릅니다(이미 배정된 곳은 목록에 나오지 않습니다).
3. 저장하면 해당 사원 카드에 거래처가 추가되고, "○○ → ○○○에게 배정" 알림이 뜹니다.

**배정을 해제하려면**, 사원 카드의 담당 거래처 줄 오른쪽에 있는 **✕** 버튼을 누릅니다. "○○를 담당에서 제외할까요?" 확인 후 제외됩니다.

> 권한 안내: 거래처를 배정·해제하는 **✕ 버튼과 배정 버튼은 관리자(팀장) 모드에서만 보입니다.** 사이드바 **모드**가 특정 사원으로 되어 있으면 본인 카드만 조회 형태로 보이고, 배정·해제 버튼은 나타나지 않습니다. 배정 작업을 하려면 모드를 "관리자(팀장)"로 바꿔 주세요.

담당자를 정리했으니, 학회 현장에서 모은 잠재 고객을 입력해 보겠습니다. 왼쪽 **학회 관리** 메뉴로 이동합니다.

---

### 2.5 학회 관리

참가한 **학회별 성과(방문자·접촉·신규거래·성공률)**를 관리하고, 학회 현장에서 받은 **방명록(방문자 명단)**을 입력해 영업으로 연결하는 화면입니다.

**화면 구성**

- 맨 위 **"학회 관리"** 제목 옆에 **+ 학회 등록** 버튼이 있습니다.
- 그 아래 **4장의 KPI 카드**: 총 방명록 / 접촉 완료 / 신규 거래처 / 미접촉.
- 그 아래 **최근 학회** 표: 학회명, 종류, 날짜, 부스비, 설치비, 방명록(방문자), 접촉, 신규거래, 성공률, 담당자 배분이 한 줄씩 표시됩니다.

**새 학회를 등록해 보겠습니다**

오른쪽 위 **+ 학회 등록** 버튼을 누르면 등록 창이 열립니다.

- **학회명**: 예) 대한정형외과학회 2026 추계.
- **종류**: 정형외과 / 신경외과 / 재활의학 / 기타.
- **날짜**: 학회 일자(오늘 날짜가 기본으로 채워져 있습니다).
- **방명록 건수**: 예상 방문자 수(예: 100).

저장하면 표 맨 위에 새 학회가 추가되고, 방문자 수는 입력값을 세 담당자에게 균등 배분합니다(배분은 이후 조정 가능).

**방명록을 입력해 보겠습니다**

표에서 **학회명(파란 밑줄 글씨)을 클릭**하면 그 학회의 **방명록 창**이 열립니다. 위쪽 "➕ 방문자 추가" 영역에서 다음을 입력합니다.

- **이름**(필수), **연락처**, **소속**(필수, 병원/기관명).
- **담당자** 드롭다운: 이 방문자를 누가 팔로우업할지.
- **상태** 드롭다운: 미접촉 / 접촉완료 / 팔로우업 / 신규계약 / 거절.
- **비고**: 메모(선택).

**추가** 버튼을 누르면 아래 명단 표에 한 줄이 더해지고, 입력칸이 비워져 다음 사람을 바로 입력할 수 있습니다. 명단의 각 줄 오른쪽 **삭제** 버튼으로 잘못 넣은 항목을 지울 수 있습니다. 방문자를 추가/삭제할 때마다 위쪽 학회 KPI(접촉·신규 등)가 자동으로 다시 계산됩니다. 입력을 마쳤으면 창 아래 **닫기** 버튼으로 나갑니다.

> 참고: 학회 표의 **성공률**은 "신규거래 ÷ 접촉" 으로 계산됩니다. 즉 접촉한 사람 중 몇 %가 실제 거래로 이어졌는지를 보여 줍니다. 방문자 상태를 "신규계약"으로 정확히 바꿔 두면 성공률이 올바르게 집계됩니다.

학회 명단을 정리했으니, 이제 사원별 매출과 인센티브를 확인해 보겠습니다. 왼쪽 **영업사원 계정** 메뉴로 이동합니다.

---

### 2.6 영업사원 계정

영업사원별 **담당 거래처·월별 매출·목표 달성률·인센티브**를 한눈에 보고, 그 자리에서 바로 발주 화면으로 넘어갈 수 있는 화면입니다.

**화면 구성**

- 맨 위 **"영업사원 마스터 계정"** 제목.
- 그 아래 사원별 **카드**가 격자로 놓입니다. 카드마다 이름·이메일, 담당 거래처 수, 이번 달 매출, **목표 달성률 막대**가 있고, 목표를 초과한 사원은 "🎁 인센티브: ○○원 (초과분 10%)" 띠가 추가로 표시됩니다.
- 카드 아래 **선택한 사원 상세** 영역: 고른 사원의 월별 매출 추이·월 목표·연락처와, 담당 거래처별 4월 매출/발주 건수 표가 나옵니다.

**사원을 골라 상세를 보겠습니다**

사원 카드를 **클릭**하면 아래 상세 영역이 그 사원 기준으로 채워집니다(처음 들어오면 첫 번째 사원이 자동 선택됨). 상세 표의 각 거래처 줄에는 거래처 코드·이름·유형·진료과·4월 매출·발주 건수가 보이고, 맨 오른쪽에 **발주** 버튼이 있습니다.

**그 자리에서 발주해 보겠습니다**

거래처 줄의 **발주** 버튼을 누르면, 그 거래처 계정으로 **발주 화면이 새 창으로 열립니다**(거래처 포털). 영업사원이 거래처를 대신해 주문을 넣어 줄 때 사용합니다.

> 참고: 인센티브는 "월 매출이 월 목표를 초과한 경우, 초과분의 10%"로 계산되어 카드에 표시됩니다. 목표 달성률 막대는 100% 이상이면 초록, 70~99%는 주황, 그 미만은 빨강으로 색이 달라져 한눈에 진척도를 알 수 있습니다.

여기까지가 "영업" 묶음 메뉴입니다. 이제 "기타" 묶음의 공지·사용량·보고서·데이터 도구를 살펴보겠습니다. 왼쪽 **📢 공지사항** 메뉴로 이동합니다.

---

### 2.7 공지사항

거래처에 보낼 **공지(자료 안내, 혜택 안내 등)를 작성·관리**하는 화면입니다. 영업팀 이름으로 발송됩니다.

**화면 구성**

- 맨 위 제목 옆에 **＋ 공지 작성** 버튼이 있습니다.
- 그 아래 **제목/본문 검색** 입력칸으로 기존 공지를 빠르게 찾을 수 있습니다.
- 그 아래 공지 목록이 나오며, 각 공지마다 **미리보기 / 편집 / 삭제** 버튼이 있습니다.

**공지를 작성해 보겠습니다**

**＋ 공지 작성** 버튼을 누르면 작성 창이 열립니다.

- **제목**(필수), **긴급도**(일반 / 긴급).
- **본문**(필수).
- **발송 대상** 드롭다운: 전체 거래처 / 대리점만 / 병원만 / **특정 업체**.
  - "특정 업체"를 고르면 아래에 업체 선택 영역이 펼쳐집니다. **검색창**으로 업체를 찾고 체크해서 고르거나, **검색결과 전체선택 / 전체해제** 버튼으로 한꺼번에 조정할 수 있습니다. 고른 업체는 위쪽에 칩(태그)으로 표시되며, 칍의 제거 버튼으로 빼낼 수 있습니다.
- **만료일**(선택): 이 날짜가 지나면 공지가 자동으로 내려갑니다.
- **상단 고정(📌 표시)** 체크박스: 중요한 공지를 목록 맨 위에 고정합니다.

작성자는 **영업팀**으로 자동 설정됩니다. 아래 **저장** 버튼으로 발송하면 됩니다.

**기존 공지를 다루겠습니다**

목록의 각 공지 버튼은 다음과 같습니다.

- **미리보기**: 거래처에게 보일 모습을 그대로 확인합니다.
- **편집**: 내용을 고칩니다(이 버튼은 편집만 하며 삭제하지 않습니다).
- **삭제**: 공지를 없앱니다(빨간색).

> 주의: **삭제**는 되돌릴 수 없습니다. 잠시 안 보이게만 하려면 삭제 대신 **만료일**을 과거 날짜로 설정하거나, 임시로 내용을 비워 두는 방식을 고려하세요.

공지를 발송했다면, 다음으로 거래처의 실사용 수량을 입력해 보겠습니다. 왼쪽 **사용량 입력** 메뉴로 이동합니다.

---

### 2.8 사용량 입력

거래처(주로 병원)의 **이번 달 실제 사용 수량**을 입력해 월 정산의 기초 자료를 만드는 화면입니다.

**화면 구성**

- 맨 위 **거래처 선택** 드롭다운(병원만 표시됨)과 **마감 기간**(읽기 전용 표시)이 있습니다.
- 그 아래 **사용량 입력 표**: 제품명·사이즈·전월사용·**당월사용(입력칸)**·단가·소계.
- 표 아래 **임시저장 / 제출** 버튼.
- 그 아래 **품목별 사용량·판매액(전체 거래처 합계)** 요약표.
- 맨 아래 **이전 제출 내역** 표.

**사용량을 입력해 보겠습니다**

1. **거래처 선택** 드롭다운에서 입력할 병원을 고릅니다. 그러면 그 거래처의 마감 기간과 품목 목록이 표에 채워집니다.
2. 각 줄의 **당월사용** 입력칸에 이번 달 실제 사용 수량을 넣습니다. 숫자를 바꾸면 그 줄의 **소계**와 표 아래 **합계**가 즉시 다시 계산됩니다.
3. 작성 중간에 보관하려면 **임시저장**, 최종 확정하려면 **제출** 버튼을 누릅니다.

**제출**을 누르면 "사용량을 제출하시겠습니까? 제출 후 수정이 제한됩니다." 확인 창이 뜨고, 확인하면 저장됩니다.

> 주의: **제출 이후에는 수정이 제한됩니다.** 숫자를 한 번 더 점검한 뒤 제출하시고, 작성 도중에는 **임시저장**을 활용하세요. 저장이 끝나면 우측 하단에 "임시 저장되었습니다 / 사용량이 제출되었습니다" 알림이 뜹니다.

아래쪽 **품목별 사용량·판매액** 요약표는 전체 거래처의 사용량을 제품·규격별로 합산해, 전월 대비 증감(▲▼)과 월 판매액을 보여 줍니다. **이전 제출 내역** 표에서는 과거에 어떤 거래처를 어느 기간에 제출했는지 확인할 수 있습니다.

사용량 입력을 마쳤다면, 품질 양식 보고서를 작성해 보겠습니다. 왼쪽 **보고서 작성** 메뉴로 이동합니다.

---

### 2.9 보고서 작성

알티바이오의 **ISO 13485 품질 양식**을 골라 채우고, AI 어시스턴트의 도움을 받아 빠르게 작성한 뒤 **인쇄·PDF로 출력**하는 화면입니다.

**화면 구성**

이 화면은 좌우 두 영역으로 나뉩니다.

- **왼쪽(양식 영역)**: 맨 위 **양식 선택** 드롭다운으로 작성할 품질 양식을 고르면, 아래에 그 양식의 입력 폼/미리보기가 나타납니다. 양식 아래에는 작업 버튼이 있습니다.
- **오른쪽(AI 어시스턴트)**: 자연어로 지시하면 양식을 자동으로 채워 주는 채팅 영역입니다.

**양식을 작성해 보겠습니다**

1. 왼쪽 위 **양식 선택** 드롭다운에서 작성할 양식을 고릅니다. 그러면 해당 양식이 화면에 펼쳐집니다.
2. 항목을 직접 입력해도 되고, 오른쪽 AI 채팅 칸에 예를 들어 "한빛정형외과로 발주서 작성" 처럼 입력한 뒤 **↑(전송)** 버튼을 누르면 AI가 관련 칸을 자동으로 채워 줍니다. 채팅 아래의 추천 문구(suggestions)를 눌러 빠르게 시작할 수도 있습니다.

**작성한 양식을 저장·출력하겠습니다**

왼쪽 양식 아래 버튼은 다음과 같습니다.

- **임시저장**: 작성 중인 내용을 보관합니다.
- **양식대로 인쇄**: 양식 서식 그대로 인쇄 창을 엽니다.
- **PDF 출력**: 작성한 양식을 PDF 파일로 내보냅니다.

보고서를 출력했다면, 마지막으로 원본 데이터를 직접 들여다보는 도구를 살펴보겠습니다. 왼쪽 **데이터 탐색기** 메뉴로 이동합니다.

---

### 2.10 데이터 탐색기

거래처·제품·주문 등 **원본 데이터를 표 형태로 직접 조회·필터·편집하고, CSV로 내보내는** 고급 도구입니다.

**화면 구성**

- 맨 위 **테이블 선택** 드롭다운으로 어떤 데이터(거래처·제품·주문 등)를 볼지 고릅니다. 오른쪽에는 작업 버튼(권한이 있으면 **＋ 새 행**, 그리고 **CSV** 내보내기)이 있습니다.
- 그 아래 **필터 막대**와 **요약 줄**.
- 그 아래 데이터가 **표(그리드)**로 표시되고, 맨 아래에 **페이지 이동** 영역이 있습니다.

**데이터를 조회하고 내보내 보겠습니다**

1. **테이블 선택** 드롭다운에서 보고 싶은 데이터를 고릅니다. 표 위에는 그 테이블의 이름과 설명이 표시됩니다.
2. **필터 막대**에서 조건을 걸어 원하는 행만 추립니다. 표 아래 페이지 버튼으로 다음/이전 페이지를 넘깁니다.
3. 화면에 보이는(필터가 적용된) 데이터를 파일로 받으려면 오른쪽 위 **CSV** 버튼을 누릅니다. "CSV N행 내보냄" 알림과 함께 파일이 저장됩니다.

**데이터를 편집하겠습니다(권한이 있을 때)**

- **＋ 새 행** 버튼을 누르면 오른쪽에 입력 패널이 열려, 새 데이터를 추가할 수 있습니다(아래 **추가** 버튼으로 저장).
- 기존 행을 클릭하면 같은 패널이 **편집** 모드로 열려, 값을 고친 뒤 **저장**할 수 있습니다.

> 주의: 데이터 탐색기는 원본 데이터를 직접 바꾸는 강력한 도구입니다. **＋ 새 행** 버튼이나 편집 패널은 해당 권한이 있을 때만 나타나며, 여기서의 추가·수정은 실제 데이터에 바로 반영됩니다. 단순히 자료를 보거나 받기만 할 때는 **CSV 내보내기**만 사용하시고, 편집은 내용을 정확히 확인한 뒤 신중히 진행하세요.

---

### 마무리

여기까지가 영업 포털의 모든 화면입니다. 일상 업무는 보통 **영업 대시보드**로 현황을 살피고 → **영업 현황**에서 기간·담당자별로 분석하고 → **거래처 관리**에서 정보와 단가를 손보고 → **담당자 관리**로 거래처를 배정하고 → **학회 관리**로 잠재 고객을 모으고 → **사용량 입력**으로 정산 자료를 만드는 흐름으로 이어집니다. 필요할 때 **공지사항**으로 거래처에 안내하고, **보고서 작성**으로 품질 양식을 출력하며, **데이터 탐색기**로 원본을 직접 확인하시면 됩니다.

작업 중 헷갈릴 때는 화면 우측 하단에 잠깐 뜨는 **알림(토스트)**으로 결과를 확인하시고, 공용 PC에서는 끝나고 꼭 **로그아웃**해 주세요.

## 3. 품질관리 포털 사용법

![품질관리 포털 대시보드 화면](qa-test-guide/images/qc-dashboard.png)

이 장은 알티바이오 **품질관리(QC) 포털**을 처음 사용하시는 분을 위한 안내서입니다. 품질관리 포털은 거래처에서 들어온 발주를 확인·확정하고, 출고를 단계별로 진행하며, 재고를 관리하고, 품질 보고서를 작성하는 모든 업무를 한 곳에서 처리하는 화면입니다.

접속 주소는 `http://localhost:3000/qc` 이며, 로그인 계정은 예시로 `qc@rtbio.com`, 비밀번호는 **관리자가 안내한 비밀번호**를 사용하시면 됩니다. 로그인하면 화면 왼쪽에 메뉴(사이드바)가 보이고, 사이드바 위쪽에는 현재 로그인한 직원 이름과 "품질관리팀"이라는 소속이 표시됩니다.

> **팁** 사이드바 사용자 정보 아래에는 "🔑 비밀번호 변경"과 "↩ 로그아웃" 링크가 있습니다. 비밀번호를 바꾸려면 "비밀번호 변경"을, 업무를 마치고 나가려면 "로그아웃"을 누르시면 됩니다.

사이드바 메뉴는 업무 흐름 순서대로 묶여 있습니다.
- **업무**: 대시보드 · 발주확정 · 출고관리 · 출고내역
- **관리**: 재고현황 · 샘플출고
- **입출고**: 입고등록 · 재고조정
- **보고서**: 보고서 작성 · 데이터 탐색기
- **거래처**: 거래처관리 · 📢 공지사항
- **시스템**: 설정 (직원 관리는 팀 관리자 권한일 때만 보입니다)

아래에서는 이 메뉴를 위에서부터 하나씩, 화면을 직접 보며 따라 할 수 있도록 설명합니다. 전체적인 업무 흐름은 **발주확정 → 출고관리(단계 이동) → 출고완료 → 재고 반영**으로 이어지므로, 이 순서대로 읽으시면 자연스럽게 이해하실 수 있습니다.

---

### 3.1 대시보드

가장 먼저 보이는 화면이 **품질관리 대시보드**입니다. 오늘 챙겨야 할 핵심 숫자(매출, 진행 주문, 재고 알림 등)를 위젯(작은 카드) 형태로 한눈에 모아 보여주는 곳입니다.

**화면 구성**
- 상단 왼쪽에 "품질관리 대시보드" 제목과 그 옆에 점 세 개(⋮) 모양의 **더보기 버튼**이 있습니다.
- 상단 오른쪽에는 파란색 **➕ 위젯 추가** 버튼이 있습니다.
- 그 아래 넓은 영역이 위젯들이 놓이는 **그리드(격자) 보드**입니다.

**위젯을 추가해 보겠습니다.** 오른쪽 위 **➕ 위젯 추가** 버튼을 누르면 "위젯 추가" 창이 열립니다. 이 창에는 두 가지 방법이 있습니다.
- **🤖 AI에게 말하기**: "이번 달 매출 보여줘"처럼 평소 말로 입력하면 그에 맞는 위젯을 추천해 줍니다.
- **갤러리에서 선택**: 미리 만들어진 위젯 목록에서 원하는 카드를 골라 클릭하면 보드에 바로 추가됩니다. 갤러리 위쪽의 **+ 직접 만들기** 버튼을 누르면 위젯을 직접 설계할 수도 있습니다.

**직접 만들기 창**에서는 위젯 제목, 데이터 소스(어떤 자료를 볼지), 차트 종류, 측정값(합계·개수 등 집계 방식), 분류 기준(그룹), 필터 조건, 정렬 기준, 최대 행 수를 선택합니다. 오른쪽 **미리보기** 영역에 실제 데이터로 결과가 미리 보이며, 마음에 들면 아래 **저장**을 누릅니다.

**보드에 올라온 위젯을 다루는 방법**
- 위젯을 마우스로 끌어(드래그) 위치를 옮기거나 크기를 조절할 수 있습니다.
- 위젯 위에서 **마우스 오른쪽 버튼**을 누르면 작은 메뉴가 나타납니다: **✏ 위젯 수정**(제목 변경), **복제**, **새로고침**(최신 숫자로 갱신), **삭제**.

**더보기(⋮) 메뉴**에는 세 가지 기능이 있습니다.
- **대시보드 내보내기**: 지금 구성을 파일로 저장합니다.
- **대시보드 가져오기**: 저장해 둔 구성 파일을 불러옵니다.
- **기본 레이아웃으로 초기화**: 처음 상태로 되돌립니다.

> **주의** "기본 레이아웃으로 초기화"를 누르면 직접 배치한 위젯 구성이 모두 사라지고 기본 모습으로 돌아갑니다. 공들여 꾸민 화면이 있다면 먼저 "대시보드 내보내기"로 백업해 두시는 것이 안전합니다.

대시보드로 오늘 상황을 파악했다면, 이제 실제 업무인 발주 확정으로 넘어가 보겠습니다. 왼쪽 메뉴에서 **발주확정**을 눌러 주세요.

---

### 3.2 발주확정

**발주확정**은 거래처가 넣은 주문을 품질관리팀이 검토하고, 출고를 시작할지(확정) · 잠시 미룰지(보류) · 돌려보낼지(반려)를 결정하는 화면입니다. 이곳에서 "확정"을 눌러야만 그 주문이 출고관리 칸반 보드로 넘어갑니다.

**화면 구성**
- 맨 위에 오늘 날짜와 "접수된 발주를 확인하고 확정합니다"라는 안내가 있습니다.
- 그 아래 **택배 마감 시간 막대**가 있어, 택배 마감까지 남은 시간을 알려줍니다(마감이 지나면 "마감 경과"로 빨갛게 표시됩니다).
- 통계 카드 3개: **접수 대기**(확정이 필요한 건수), **오늘 확정**(출고 진행 중), **오늘 출고**(출고 완료).
- **접수 대기** 목록: 확정을 기다리는 발주들이 카드로 나열됩니다.
- 맨 아래 접을 수 있는 **⏸ 보류 건** 영역(보류한 발주가 있을 때만 보입니다).

> **사이드바 알림 배지** 접수 대기 발주가 있으면, 왼쪽 메뉴의 "발주확정" 글자 옆에 건수 배지가 표시됩니다. 처리할 발주가 남았는지 메뉴만 봐도 알 수 있습니다.

**발주 한 건을 확정해 보겠습니다.** 접수 대기 목록에서 발주 카드를 클릭하면 카드가 펼쳐지며 주문한 품목 목록, 사이즈·수량, 그리고 **현재 재고 수량**이 함께 표시됩니다. 재고가 부족하면 "재고부족" 또는 "출고 후 N개"처럼 경고가 함께 나오므로, 확정 전에 재고를 확인할 수 있습니다. 제품명은 제품군별로 색이 다르게 표시되어(리코탭플러스=검정, 리스프린트=빨강 등) 한눈에 구분됩니다.

카드 아래쪽에는 세 개의 버튼이 있습니다.
- **✔ 확정**(초록색): 발주를 받아들이고 출고를 시작합니다.
- **⏸ 보류**(노란색): 판단을 잠시 미룹니다.
- **✖ 반려**(외곽선): 발주를 거절해 돌려보냅니다.

**✔ 확정**을 누르면 "발주 확정" 창이 열립니다. 발주번호·거래처·품목 수·합계가 보이고, 아래에 **담당자 배정** 선택 칸이 있습니다. 담당자를 반드시 한 명 고른 뒤(필수) 확인을 누르면, 주문 상태가 **확정**으로 바뀌고 동시에 **출고가 자동으로 시작**됩니다. 이때 시스템은 주문 수량만큼 **가용재고를 예약**해 둡니다. 확정된 카드는 발주확정 목록에서 사라지고, 출고관리 칸반 보드의 첫 단계(대기)에 새 카드로 나타납니다.

> **주의** 담당자를 고르지 않으면 "담당자를 배정해주세요"라는 안내가 나오고 확정되지 않습니다. 담당자 배정은 누가 그 출고를 책임지는지 기록으로 남기는 중요한 단계입니다.

**보류**가 필요하면 **⏸ 보류** 버튼을 누릅니다. 창이 열리면 보류 사유(예: "재고 확인 중", "거래처 연락 대기")를 적어야 합니다. 보류된 발주는 목록 아래쪽 **⏸ 보류 건** 영역으로 이동합니다. 이 영역의 머리글을 클릭하면 펼쳐지며, 각 보류 건마다 **접수 복원**(다시 대기 상태로 되돌리기)과 **바로 확정**(바로 확정 창 열기) 버튼이 있습니다.

**반려**가 필요하면 **✖ 반려** 버튼을 누릅니다. 반려 사유(예: "재고 부족", "단가 확인 필요")를 입력해야 하며, 확인하면 발주가 거래처로 반려 처리됩니다.

> **사유는 꼭 입력하세요** 보류와 반려는 사유를 비워 두면 진행되지 않습니다. 사유는 거래처와 동료가 이유를 알 수 있게 하는 기록이므로 구체적으로 적어 주세요.

발주를 확정했으니, 이제 그 발주가 실제로 어떻게 출고되는지 보겠습니다. 왼쪽 메뉴에서 **출고관리**를 눌러 주세요.

---

### 3.3 출고관리 (칸반 보드)

**출고관리**는 확정된 발주가 출고 완료될 때까지 거치는 단계를 **칸반 보드**(카드를 단계별 열에 늘어놓은 판)로 보여 주는 화면입니다. 각 주문은 카드 한 장이고, 카드를 다음 열로 옮기며 작업 진행 상황을 관리합니다.

기본 단계는 왼쪽부터 **⏳ 대기 → 🏷️ 바코드출력 → ⚙️ 세팅 → 📦 포장 → 🚚 송장 → ✅ 출고완료** 순서입니다.

**화면 구성**
- 위쪽 **택배 마감 막대**(발주확정 화면과 동일).
- 그 아래 **날짜 필터 버튼**: 어제 · 오늘(기본) · 이번주 · 기간선택. "기간선택"을 누르면 시작일/종료일을 직접 고를 수 있는 날짜 입력 칸이 나타납니다.
- 가운데 **오늘 출고 진행 막대**: 오늘 출고한 수량을 일일 목표(300개) 대비로 보여 주고, 진행 중 수량도 함께 표시합니다.
- 오른쪽 **보드 수정** 버튼: 단계(열)를 추가·수정·삭제합니다.
- 그 아래가 실제 **칸반 보드**입니다.

**카드 보는 법.** 각 카드에는 주문번호, 거래처명, 배송방법 배지(택배/방문수령/퀵), 담당자 아바타(동그란 이름표), 접수 시각이 표시됩니다. 어제 넘어온 주문에는 "이월" 배지가, 메모가 달린 주문에는 메모 아이콘이 붙습니다. 카드 아래쪽 **상세 ▼**를 누르면 품목 내역, 금액, 배송지, 시작/종료 시각이 펼쳐집니다.

**카드를 클릭하면 상세 창**이 열립니다. 여기서 거래처·담당자·배송지·합계·진행 단계를 한눈에 보고, 아래쪽 버튼으로 작업을 진행할 수 있습니다.

**카드를 다음 단계로 옮겨 보겠습니다.** 카드 상세 창 아래의 **➡ (다음 단계명)** 버튼을 누르거나, 카드 위에서 **마우스 오른쪽 버튼**을 눌러 나오는 메뉴에서 **➡ 다음 단계로**를 선택합니다. 그러면 이동 확인 창이 열리는데, 다음 단계의 담당자를 고를 수 있습니다(기본값은 현재 담당자). **이동하기**를 누르면 카드가 다음 열로 넘어갑니다.

카드를 마지막 단계인 **✅ 출고완료**로 옮기면 출고가 끝났다고 보고, 시스템이 **실물 재고를 주문 수량만큼 차감**하고 주문을 **완료** 상태로 바꿉니다. 이 시점에 거래처원장·매출 집계에 반영됩니다.

**카드 오른쪽 클릭 메뉴(컨텍스트 메뉴)에는 다음 기능이 있습니다.**
- **➡ 다음 단계로** / **⬅ 이전 단계로**: 단계 이동(이전 단계로 되돌릴 수도 있습니다).
- **배지 달기**: 카드에 색상 배지(예: "긴급", "VIP")를 답니다. 색을 고르고 텍스트를 입력하면 됩니다(카드에는 2글자만 보이고, 마우스를 올리면 전체가 보입니다).
- **메모 추가**: 카드에 메모를 적습니다(예: "오후 2시 이전 발송 필수").
- **상세보기**: 카드 상세 창을 엽니다.

**상세 창에서 담당자를 더 배정/해제할 수도 있습니다.** "담당자(현재 단계)" 영역에서 드롭다운으로 직원을 고르고 **+ 추가**를 누르면 배정됩니다(한 단계당 최대 3명). 이름표 옆 **✕**를 누르면 해제됩니다. 상세 창의 **거래명세서 출력** 버튼을 누르면 그 주문의 거래명세서가 새 창으로 열려 인쇄하거나 PDF로 저장할 수 있습니다.

> **거래명세서 다운로드 버튼** 출고완료 단계의 카드에는 "거래명세서 다운로드" 버튼이 보입니다. 단, 경영지원팀이 명세서를 발급하기 전에는 "명세서 발급 대기"로 표시되어 누를 수 없습니다.

> **경영지원팀이 발주를 수정한 경우** 카드 오른쪽 위에 빨갛게 깜빡이는 **⚠️ 수정** 배지가 나타납니다. 이 배지를 클릭해 수정 내용을 확인하고 "확인 — 진행 가능"을 누르기 전까지는 다음 단계로 이동할 수 없습니다. 변경된 수량/품목을 모르고 작업하는 일을 막기 위한 안전장치입니다.

**보드 수정(단계 추가/변경).** 오른쪽 위 **보드 수정** 버튼을 누르면 단계 목록이 나옵니다. 각 줄에서 아이콘·이름·색상을 고칠 수 있고, **+ 열 추가**(최대 8개), 줄 끝의 **✕**로 삭제할 수 있습니다(최소 2개는 남겨야 합니다). 수정 후 **저장**을 누르면 보드에 반영됩니다.

> **주의** 카드가 들어 있는 단계(열)는 삭제하면 해당 카드들이 이전 열로 옮겨집니다. 또한 출고가 시작되지 않은 주문은 단계를 옮길 수 없으며 "발주확정에서 출고를 먼저 시작하세요"라는 안내가 나옵니다.

출고가 끝난 주문들은 별도의 조회 화면에서 모아 볼 수 있습니다. 왼쪽 메뉴에서 **출고내역**을 눌러 주세요.

---

### 3.4 출고내역

**출고내역**은 **출고가 완료된 주문**만 모아서 조회·검색하는 화면입니다. 지난 출고 기록을 거래처별·기간별로 찾아보고, 누가 어느 단계를 맡았는지까지 확인할 수 있습니다.

**화면 구성**
- 위쪽 **기간 필터 버튼**: 오늘(기본) · 이번주 · 이번달 · 기간선택. "기간선택"은 시작일/종료일 입력 칸을 띄웁니다.
- 그 옆 **거래처 검색** 입력칸: 거래처명을 입력하면 즉시 걸러집니다.
- **요약 통계 칩**: 건수 · 합계금액 · 명세서 발급 건수.
- **출고 내역 표**: 출고일자 · 주문번호 · 거래처 · 배송방법 · 금액 · 명세서(발급/미발급) · 상세 버튼.

**사용 방법.** 먼저 위쪽에서 기간을 고르고, 필요하면 거래처명을 입력해 좁힙니다. 표는 최신 출고 순으로 정렬됩니다. 특정 주문 줄을 클릭하거나 오른쪽 **상세 →** 버튼을 누르면 **출고 상세 창**이 열립니다.

상세 창에는 거래처·배송방법·접수 일자·출고 일자·처리 시작 시각·명세서 발급 여부가 정리되어 있고, 그 아래 **단계별 담당자** 표(각 단계를 누가 맡았는지)와 **품목 내역** 표(제품·규격·수량·단가·금액·합계)가 표시됩니다. 출고 기록을 추적하거나 거래처 문의에 답할 때 유용합니다.

이제 출고의 바탕이 되는 재고를 관리하는 화면들로 넘어가겠습니다. 왼쪽 메뉴 "관리"의 **재고현황**을 눌러 주세요.

---

### 3.5 재고현황

**재고현황**은 전체 제품의 재고를 표로 보여 주고, 신규 제품을 등록하거나 기존 제품 정보를 수정·삭제하는 화면입니다.

**화면 구성**
- 오른쪽 위 **+ 신규 제품 등록** 버튼.
- 통계 카드 3개: **총 제품 수** · **재고 부족 제품**(재고 30 미만) · **총 재고 수량**.
- **카테고리 탭**: 전체 · 무릎 · 상지 · 하지 · 스프린트. 탭을 누르면 해당 카테고리 제품만 보입니다.
- **검색 입력칸**: 제품명이나 SKU로 검색합니다.
- **재고 표**: 제품명 · SKU · 사이즈 · 기본단가 · 실재고 · 가용재고 · 예약 · 상태 · 관리.

**표 읽는 법.** **실재고**는 창고에 실제로 있는 수량, **가용재고**는 예약분을 뺀 판매 가능 수량입니다. **예약**은 확정된 주문이 잡아 둔 수량입니다. 상태는 가용재고 기준으로 **정상**(초록)·**주의**(노랑)·**부족**(빨강)으로 색이 칠해지고, 재고가 적은 줄은 행 전체가 노랗거나 붉게 강조됩니다.

**신규 제품을 등록해 보겠습니다.** 오른쪽 위 **+ 신규 제품 등록**을 누르면 등록 창이 열립니다. 입력 항목은 다음과 같습니다.
- **제품코드**: 자동 생성(직접 입력하지 않습니다).
- **SKU**: 제품 고유번호(예: RTP-KN-S01). 입력 중 기존 제품 자동완성 목록이 떠서 고를 수 있습니다.
- **제품명**: 필수. 여기에도 자동완성이 동작합니다.
- **카테고리**: 필수(무릎/상지/하지/스프린트).
- **사이즈**: S·M·L·XL·Free 중 해당하는 것을 체크.
- **기본단가(원)** / **세트 수량**.
- **편측/양측** / **상태**(활성/비활성).
- **초기 재고** / **안전재고**(이 수량 미만이면 부족 알림).

제품명과 카테고리를 채운 뒤 **등록**을 누르면 제품이 목록 맨 위에 추가됩니다.

**기존 제품을 수정/삭제하려면** 표 오른쪽 "관리" 칸의 버튼을 사용합니다. **수정**을 누르면 같은 형태의 창이 현재 값으로 채워져 열리고, 바꾼 뒤 **저장**합니다. **삭제**(빨간 글씨)를 누르면 확인 창이 뜨고, 확인하면 제품이 제거됩니다.

> **주의** 제품 삭제는 되돌릴 수 없으며, 재고 이력도 함께 사라집니다. 더 이상 쓰지 않는 제품은 삭제 대신 수정 창에서 상태를 "비활성"으로 바꾸는 것도 고려해 보세요.

제품을 등록·확인했으니, 매출에 잡히지 않는 샘플을 내보내는 화면을 살펴보겠습니다. 왼쪽 메뉴에서 **샘플출고**를 눌러 주세요.

---

### 3.6 샘플출고

**샘플출고**는 거래처에 샘플·데모 제품을 내보낼 때 사용하는 화면입니다. 일반 판매와 달리 **매출에 잡히지 않고 재고만 차감**되며, 화면 위쪽에 노란 안내문으로 이 점을 분명히 알려 줍니다.

오른쪽 위에 두 가지 입력 방식 탭이 있습니다.
- **단일 추가**: 제품을 하나씩 골라 장바구니에 담는 방식(기본).
- **그리드 입력**: 카테고리별 표에서 사이즈 칸마다 수량을 채워 여러 제품을 한 번에 입력하는 방식.

**단일 추가로 샘플을 내보내 보겠습니다.**
1. **거래처** 칸에 거래처명을 입력하면 자동완성 목록이 뜹니다. 거래처를 골라 주세요(필수).
2. "제품 추가" 영역에서 **제품**을 고르면 그 제품의 **사이즈** 선택지가 채워집니다. 사이즈와 **수량**을 정하고 **+ 추가**를 누르면 아래 "출고 제품 목록"(장바구니)에 담깁니다. 여러 품목을 반복해서 담을 수 있고, 목록의 **✕**로 뺄 수 있습니다.
3. **사유**를 입력합니다(필수). 아래 "빠른 선택"에서 **샘플요청 · 데모용 · 교환/반품**을 누르면 사유가 자동으로 채워집니다.
4. 맨 아래 **샘플 출고 등록** 버튼을 누르면 등록됩니다. 장바구니가 비어 있거나 사유가 없으면 버튼이 비활성화되어 있습니다.

**그리드 입력 방식**은 무릎/상지/하지/스프린트 카테고리별로 제품을 행으로, 사이즈를 열로 펼친 표에 직접 수량을 입력합니다. 샘플 단가는 **기본단가에서 5% 할인(-5%)**된 금액으로 표시되며, 입력에 따라 제품별 소계와 화면 아래 합계가 실시간으로 계산됩니다. **초기화**로 전체를 지우거나, 거래처·사유를 채운 뒤 **그리드 일괄 출고**로 한 번에 등록할 수 있습니다.

등록이 끝나면 화면 아래 **최근 샘플 출고 내역**에 날짜·거래처·품목·수량·사유·담당자·상태가 기록됩니다. 이 내역은 기간·검색으로 거를 수 있고 CSV로 내려받을 수도 있습니다.

> **주의** 샘플출고는 재고를 즉시 음수로 차감합니다. 거래처·사유·수량을 다시 한 번 확인한 뒤 등록해 주세요. 잘못 내보낸 경우 "재고조정" 화면에서 사유를 적어 보정해야 합니다.

샘플과 마찬가지로 재고를 직접 다루는 화면이 입출고입니다. 왼쪽 메뉴 "입출고"의 **입고등록**을 눌러 주세요.

---

### 3.7 입고등록

**입고등록**은 공급처에서 들어온 제품을 시스템 재고에 더하는 화면입니다. 엑셀처럼 생긴 표에 여러 품목을 한 번에 입력할 수 있습니다.

**화면 구성**
- 위쪽 입력란: **입고일자** · **공급처**(메디텍코리아/한국의료기/글로벌메드 중 선택) · **비고**(메모).
- **입고 품목** 표: # · 제품명 · 규격 · 입고수량 · 현재재고 · 입고 후 재고.
- 표 아래 버튼: **+ 행 추가** · **임시저장** · **입고 확정**.
- 맨 아래 **최근 입고 이력**.

**입고를 등록해 보겠습니다.**
1. 입고일자·공급처·비고를 위쪽에서 정합니다.
2. 표의 각 줄에서 **제품명**을 고르면 그 제품의 **규격(사이즈)**이 자동으로 채워지고, **현재재고**도 표시됩니다. 규격을 확인하고 **입고수량**을 입력하면, 오른쪽 **입고 후 재고**가 자동으로 계산됩니다.
3. 품목이 더 많으면 **+ 행 추가**로 줄을 늘립니다.
4. 다 입력했으면 **입고 확정**을 누릅니다. 그러면 입력한 품목들이 한꺼번에 재고에 반영되고, 표는 빈 줄 하나만 남도록 초기화되며, "최근 입고 이력"에 새 줄이 추가됩니다.

**임시저장**은 아직 확정하지 않고 잠깐 보관할 때 누릅니다.

> **주의** 제품·사이즈가 선택되지 않았거나 수량이 0인 줄은 입고에서 제외됩니다. "입고할 품목이 없습니다"라는 안내가 나오면 제품·규격·수량이 제대로 입력됐는지 확인해 주세요. **입고 확정**을 누르면 실제 재고가 늘어나므로 수량을 한 번 더 확인하시는 것이 좋습니다.

입고로 재고를 늘렸다면, 실사 결과나 반품 등으로 재고를 맞추는 화면도 알아 두겠습니다. 왼쪽 메뉴에서 **재고조정**을 눌러 주세요.

---

### 3.8 재고조정

**재고조정**은 실제 재고 조사(실사) 결과나 반품·파손·분실 등으로 시스템 수치와 실제 수량이 달라졌을 때, 차이를 보정해 재고를 맞추는 화면입니다.

**화면 구성**
- 통계 카드 4개: 총 조정 건수 · 증가 조정 · 감소 조정 · 최근 조정일.
- **재고 조정 입력** 표: # · 제품명 · 규격 · 시스템 재고 · 실사 재고 · 차이 · 사유 · 비고.
- 표 아래 **조정 확정** 버튼.
- 맨 아래 **조정 이력**.

**재고를 조정해 보겠습니다.** 표의 각 줄에서 **제품명**을 고르고, **실사 재고**(실제로 센 수량)를 입력합니다. 그러면 **차이** 칸에 시스템 재고와의 차이가 +/− 색상으로 자동 표시됩니다. **사유**를 드롭다운에서 고르고(실사조정·반품·파손·분실·기타), 필요하면 **비고**에 설명을 적습니다(예: "사이즈 불량 반품"). 입력을 마치면 **조정 확정**을 누릅니다. 차이가 0이 아닌 줄만 한꺼번에 반영되고, "조정 이력"에 기록이 추가됩니다.

> **사유에 따른 처리** 시스템은 사유에 맞춰 재고를 더하거나 빼서 반영합니다. "반품"은 보통 재고를 늘리고, "파손·분실"은 재고를 줄입니다. "실사조정"과 "기타"는 차이 방향에 따라 알맞게 처리됩니다. 비고에 구체적인 상황을 적어 두면 나중에 추적하기 쉽습니다.

> **주의** 실사 재고가 시스템 재고와 같은 줄(차이 0)은 조정되지 않습니다. "조정할 변경이 없습니다"라는 안내가 나오면 실사 재고를 바꿨는지 확인해 주세요.

재고 관리를 익혔으니, 품질관리팀이 가장 많이 쓰는 품질 보고서 작성 화면으로 넘어가겠습니다. 왼쪽 메뉴 "보고서"의 **보고서 작성**을 눌러 주세요.

---

### 3.9 보고서 작성

**보고서 작성**은 알티바이오의 ISO 13485 품질 양식을 화면에서 채우고, 인쇄하거나 PDF로 내보내는 화면입니다. 옆에 **AI 어시스턴트**가 있어, 말로 설명하면 양식을 자동으로 채워 줍니다.

**화면 구성**
- 왼쪽: **양식 선택 드롭다운**과 그 아래 양식 미리보기(채울 수 있는 표 형태).
- 왼쪽 아래 버튼: **임시저장** · **양식대로 인쇄** · **PDF 출력**.
- 오른쪽: **🤖 AI 어시스턴트** 대화창과 입력칸.

**양식을 작성해 보겠습니다.** 위쪽 드롭다운에서 양식을 고릅니다(품질관리팀에는 출고 검사·부적합 처리·이상사례 보고 등 ISO 13485 양식들이 들어 있습니다). 양식을 고르면 가운데에 표가 나타나고, 각 칸을 직접 클릭해 값을 입력할 수 있습니다.

**AI로 자동 채우기.** 오른쪽 입력칸에 평소 말로 적으면 됩니다. 예: "리코탭플러스 무릎 숏 50개 출고 검사 합격". 입력 후 **↑(전송)** 버튼을 누르거나 Enter 키를 치면, AI가 내용을 해석해 왼쪽 양식의 해당 칸을 채워 줍니다. 입력칸 아래에는 자주 쓰는 문구 추천도 표시됩니다.

작성을 마치면 아래 버튼으로 마무리합니다.
- **임시저장**: 작성 중인 내용을 보관합니다.
- **양식대로 인쇄**: 양식 그대로 인쇄 대화상자를 엽니다.
- **PDF 출력**: 인쇄 대화상자를 열며, 거기서 "PDF로 저장"을 고르면 PDF 파일로 저장됩니다.

> **팁** PDF 출력과 인쇄 모두 브라우저의 인쇄 기능을 사용합니다. 인쇄 대화상자에서 프린터 대신 "PDF로 저장"을 선택하면 파일로 보관할 수 있습니다.

양식 보고서 외에, 원본 데이터를 직접 들여다봐야 할 때가 있습니다. 왼쪽 메뉴에서 **데이터 탐색기**를 눌러 주세요.

---

### 3.10 데이터 탐색기

**데이터 탐색기**는 시스템에 저장된 원본 데이터(거래처, 제품, 주문 등)를 표 형태로 직접 조회·필터링·편집하고, CSV/Excel로 내보내는 화면입니다. 정해진 메뉴로는 보기 어려운 세부 데이터를 직접 확인할 때 사용합니다.

**화면 구성**
- 위쪽 **테이블 선택 드롭다운**: 볼 데이터(테이블)를 고릅니다.
- 그 옆 도구 영역과 **필터 막대**: 조건을 걸어 원하는 행만 봅니다.
- 가운데 **데이터 표**: 선택한 테이블의 내용이 행/열로 표시됩니다.
- 아래 **페이지 이동(페이지네이션)**: 데이터가 많을 때 페이지를 넘깁니다.
- 행을 클릭하면 오른쪽에서 **상세 패널**이 열려 값을 확인·편집할 수 있습니다.

**사용 방법.** 먼저 위쪽 드롭다운에서 보고 싶은 테이블을 고릅니다. 필요하면 필터 막대에서 조건을 추가해 원하는 행만 추립니다. 표의 한 행을 클릭하면 상세 패널에서 값을 확인하고, 편집 가능한 항목은 고쳐서 저장할 수 있습니다. 도구 영역의 내보내기 기능으로 현재 데이터를 CSV/Excel 파일로 저장할 수 있습니다.

> **주의** 데이터 탐색기는 원본 데이터를 직접 다룹니다. 값을 수정하면 다른 화면에도 그대로 반영되므로, 편집은 정확한 값을 확인한 뒤 신중하게 진행해 주세요.

다음은 거래처 정보를 관리하는 화면입니다. 왼쪽 메뉴 "거래처"의 **거래처관리**를 눌러 주세요.

---

### 3.11 거래처관리

**거래처관리**는 거래처(대리점·병원) 정보를 등록·조회·수정하는 화면입니다. 이 화면은 경영지원·영업 포털과 동일한 공통 폼을 사용하므로, 세 팀이 같은 형태로 거래처를 관리합니다.

**화면 구성과 사용 방법.** 화면에는 거래처 목록이 표시되며, 위쪽 검색칸으로 거래처를 찾을 수 있습니다. 거래처를 선택하면 기본 정보(이름·유형·담당자·연락처·주소 등)와 함께, 복수 배송지·할인/단가 정보 등을 확인할 수 있습니다. 새 거래처를 추가하거나 기존 정보를 수정하는 폼이 제공됩니다.

> **참고** 거래처는 하나가 여러 배송지를 가질 수 있고, 발주 시 그중 하나를 선택해 주문에 배송지가 기록됩니다. 품질관리 업무에서는 주로 출고처·연락처 확인용으로 이 화면을 참고하시게 됩니다.

거래처와 관련해 안내사항을 보낼 수도 있습니다. 왼쪽 메뉴의 **📢 공지사항**을 눌러 주세요.

---

### 3.12 공지사항

**공지사항**은 거래처나 사내에 알림을 작성·발송하고, 받은 공지를 확인하는 화면입니다. 품질관리팀은 **리콜·재고·납기 안내** 같은 품질 관련 공지를 거래처에 보낼 수 있습니다. 작성된 공지는 자동으로 **품질관리팀** 이름으로 기록됩니다.

**화면 구성과 사용 방법.** 화면에 공지 목록이 표시되고, 새 공지를 작성하는 기능이 있습니다. 공지를 작성할 때 받는 대상(전체 또는 특정 거래처)을 정하고 제목·내용을 입력해 발송합니다. 작성한 공지는 목록에서 편집하거나 삭제할 수 있습니다.

> **팁** 특정 거래처에만 보낼 때는 대상에서 해당 거래처를 선택하면 됩니다. 리콜처럼 중요한 안내는 제목에 핵심을 분명히 적어 거래처가 놓치지 않도록 해 주세요.

마지막으로, 시스템 동작에 영향을 주는 설정 화면을 살펴보겠습니다. 왼쪽 메뉴 "시스템"의 **설정**을 눌러 주세요.

---

### 3.13 설정

**설정**은 시스템 전반에 적용되는 값(테넌트 설정)을 관리하는 화면입니다. 경영지원팀과 동기화되어 있어, 한쪽에서 바꾸면 양쪽에 반영됩니다. 품질관리 포털에서는 **기본 설정**과 **재고 설정** 탭만 보입니다(회사 정보·이메일·공급업체 등은 경영지원 전용).

**화면 구성과 사용 방법.** 위쪽 탭(기본 · 재고)으로 설정 영역을 전환합니다. 각 탭에서 값을 보고 수정한 뒤 저장하면, 해당 설정이 시스템 동작(예: 부가세율, 재고 관련 기준 등)에 반영됩니다.

> **주의** 설정 값은 거래명세서 부가세 계산이나 재고 기준 등 실제 업무 계산에 영향을 줍니다. 값을 바꾸기 전에 어떤 화면에 영향이 가는지 확인하고, 필요하면 경영지원팀과 상의한 뒤 변경하시는 것이 좋습니다.

---

### 3.14 (참고) 직원 관리

**직원 관리** 메뉴는 **팀 관리자 권한**을 가진 분에게만 사이드바에 표시됩니다(일반 품질관리 직원에게는 보이지 않습니다). 이 화면에서는 같은 팀 직원 계정을 조회·등록·수정하고, 부서·직급을 지정하며, 계정을 활성/비활성으로 전환할 수 있습니다. 이 메뉴가 보이지 않는다면 권한이 없는 것이므로, 계정 관련 요청은 팀 관리자에게 문의하시면 됩니다.

---

이상으로 품질관리 포털의 모든 화면 사용법을 살펴보았습니다. 실제 하루 업무는 보통 **대시보드로 현황 확인 → 발주확정에서 주문 확정 → 출고관리에서 단계별 진행 → 출고완료 → 출고내역으로 마무리 확인**의 흐름으로 이어지며, 그 사이사이에 재고현황·입고등록·재고조정·샘플출고로 재고를 맞추고, 보고서 작성으로 품질 기록을 남기시게 됩니다. 처음에는 발주확정과 출고관리 두 화면만 익숙해지셔도 핵심 업무는 충분히 처리하실 수 있습니다.

---

## 4. 거래처 포털 사용법

![거래처 포털 대시보드 화면](qa-test-guide/images/client-dashboard.png)

거래처 포털은 알티바이오와 거래하는 병원·대리점·약국이 **직접 발주를 넣고, 진행 상황을 확인하고, 공지를 받아 보는** 전용 화면입니다. 영업 담당자에게 전화나 카카오톡으로 주문을 넣던 일을, 이제 거래처가 직접 이 포털에서 처리하실 수 있습니다.

- 접속 주소: `http://localhost:3000/client`
- 로그인 계정 예: `{거래처코드}@client.local` (예: `medipharm@client.local`)
- 비밀번호: **관리자(알티바이오)가 안내한 비밀번호**를 사용하시면 됩니다. 아이디와 비밀번호는 모두 알티바이오에서 발급해 드리며, 분실 시 담당자에게 문의하시면 재발급해 드립니다.
- 이 포털은 **CLIENT(거래처) 권한** 전용입니다. 다른 권한(경영지원·영업·품질관리·대표)으로 로그인하면 자동으로 각자의 포털로 이동합니다.

이 포털은 모바일과 PC 화면 양쪽에 맞춰 자동으로 모양이 바뀝니다. 휴대폰에서는 화면 아래쪽에 **홈 / 발주 / 내역 / 공지 / 계정** 5개 버튼이 있는 하단 메뉴 바가 나타나고, PC에서는 상단에 같은 메뉴가 가로로 표시됩니다. 아래에서는 실제 사용 순서대로 화면을 하나씩 따라가 보겠습니다.

---

### 4.1 로그인 — 포털에 들어가기

가장 먼저 만나는 화면입니다. 포털에 처음 접속하면 잠깐 **"거래처 정보를 불러오는 중..."** 이라는 회전 표시(로딩 화면)가 보였다가, 로그인 화면이나 곧바로 홈 화면으로 넘어갑니다.

**화면 구성**
- 상단에 RTBIO 로고와 "거래처 발주 시스템" 안내 문구가 있습니다.
- **아이디** 입력칸, **비밀번호** 입력칸이 차례로 있습니다.
- 그 아래 파란색 **[로그인]** 버튼이 있습니다.
- 맨 아래에는 "로그인 문의: 070-1234-5678" 과, 아이디·비밀번호는 알티바이오에서 발급한다는 안내가 적혀 있습니다.

**사용 시나리오**
1. **아이디** 칸에 발급받은 아이디를 입력합니다.
2. **비밀번호** 칸에 안내받은 비밀번호를 입력합니다.
3. **[로그인]** 버튼을 누르면 됩니다. 키보드의 Enter 키를 눌러도 로그인됩니다.
4. 로그인에 성공하면 "○○○ (담당자님) 로그인 완료" 라는 안내가 잠깐 뜨고, 곧바로 **홈 화면**으로 들어갑니다.

> **주의 — 아이디/비밀번호가 틀린 경우**
> "아이디 또는 비밀번호가 올바르지 않습니다." 라는 빨간 안내가 뜹니다. 대소문자나 공백을 다시 확인해 보시고, 그래도 안 되면 위에 적힌 고객센터(070-1234-5678) 또는 담당자에게 비밀번호 재발급을 요청하세요. 비밀번호는 거래처가 스스로 바꿀 수 없고, 알티바이오에서 관리합니다.

로그인이 끝났으니, 이제 가장 먼저 보이는 홈 화면부터 살펴보겠습니다.

---

### 4.2 홈 (대시보드) — 한눈에 보는 우리 거래처 현황

홈 화면은 로그인 직후 처음 보이는 화면이자, 하단 메뉴의 **[홈]** 버튼으로 언제든 돌아올 수 있는 출발점입니다. 이번 달 우리 거래처가 얼마나 발주했는지, 최근 주문은 무엇인지, 새 공지는 있는지를 한눈에 보여 줍니다.

**화면 구성 (위에서부터)**
1. **파란 인사 카드** — "안녕하세요, ○○○님" 인사말과 우리 거래처명이 표시됩니다. 그 안에 큰 버튼 두 개, **[발주하기]** 와 **[발주내역]** 이 있어 자주 쓰는 두 작업으로 바로 갈 수 있습니다.
2. **요약 통계 카드 2개** — "○년 ○월 발주"(이번 달 발주 건수)와 "○년 ○월 금액"(이번 달 발주 금액 합계)을 보여 줍니다. 달 이름은 실제 데이터 기준으로 자동 표시됩니다.
3. **공지사항 미니 섹션** — 최근 받은 공지 최대 3건이 요약으로 뜹니다. 오른쪽의 **[전체보기 ›]** 를 누르면 공지사항 전체 페이지로 이동합니다. 아직 읽지 않은 공지에는 빨간 **NEW** 표시가 붙습니다.
4. **최근 발주** — 가장 최근 주문 최대 3건이 카드 형태로 나옵니다. 각 카드에는 주문번호, 진행 상태 배지, 주문한 제품 요약, 금액, 날짜가 적혀 있습니다.

**사용 시나리오**
- 발주를 새로 넣고 싶다면 파란 카드의 **[발주하기]** 버튼을 누르세요. 곧바로 발주 화면으로 이동합니다.
- 지난 주문을 확인하려면 **[발주내역]** 버튼을 누르거나, 아래 "최근 발주"의 주문 카드를 직접 눌러 보세요. 해당 주문의 **출고 상태 화면**으로 바로 들어갑니다.
- 새 공지가 궁금하면 공지 미니 카드를 누르거나 **[전체보기 ›]** 를 눌러 공지 페이지로 이동합니다.

> **팁** — 로그인 직후, 아직 읽지 않은 새 공지가 있으면 화면 가운데에 **공지 팝업**이 자동으로 떠오릅니다. 내용을 확인하고 **[확인]** 을 누르면 닫힙니다. 다시 보고 싶지 않으면 팝업 아래 **"다시 보지 않기"** 를 체크한 뒤 닫으세요. (공지에 대한 자세한 내용은 4.6에서 설명합니다.)

이제 가장 중요한 기능인 발주를 직접 해 보겠습니다.

---

### 4.3 발주하기 — 주문서 작성

발주 화면은 알티바이오에 주문을 넣는 핵심 화면입니다. 엑셀 표처럼 생긴 주문서에 제품별로 **사이즈별 수량만 입력**하면, 단가·소계·배송비·합계가 자동으로 계산됩니다.

**화면 구성 (위에서부터)**
1. **마감 시간 안내 바** — "현재 14:20 | 택배 마감 15:30 (1시간 10분 남음)" 처럼 현재 시각과 당일 출고 마감(15:30)까지 남은 시간을 보여 줍니다. 마감이 가까우면 색이 노랑→빨강으로 바뀌어 경고합니다.
2. **카테고리 빠른 이동 버튼** — `무릎 / 상지 / 하지 / 스프린트` 버튼을 누르면 해당 제품 묶음으로 화면이 부드럽게 스크롤됩니다.
3. **무료배송 안내 배너** — 카테고리별로 일정 수량 이상 주문하면 배송비가 무료가 됩니다. 현재 몇 개를 더 담아야 무료가 되는지, 또는 이미 무료배송이 달성됐는지 실시간으로 알려 줍니다.
4. **엑셀형 주문서** — 카테고리별로 표가 나뉘어 있습니다. 각 행은 제품 하나이고, 가로로 **S · M · L · XL** 사이즈 입력칸과 **단가**, **소계** 열이 있습니다. (사이즈가 하나뿐인 Free 사이즈 제품은 칸 하나로 합쳐져 나옵니다.)
5. **주문 요약** — PC에서는 화면 오른쪽에 "주문 요약" 사이드바가, 모바일에서는 표 아래에 요약 카드와 화면 맨 아래 떠 있는 요약 바가 나타나, 선택한 품목·소계·배송비·합계를 계속 보여 줍니다.

**사용 시나리오 — 주문 담기**
1. 사고 싶은 제품을 표에서 찾습니다. 카테고리 빠른 이동 버튼으로 원하는 묶음(예: 무릎)으로 점프하면 빠릅니다.
2. 원하는 **사이즈 칸(S/M/L/XL)** 에 **수량을 숫자로 입력**합니다. 칸을 누르면 기존 값이 자동 선택되어 바로 새 숫자를 칠 수 있습니다.
3. 수량을 입력하는 순간 그 칸이 색으로 강조되고, 행 오른쪽의 **소계**가 자동으로 계산되며, 화면의 주문 요약(소계·배송비·합계)도 즉시 바뀝니다.
4. 여러 제품·여러 사이즈를 자유롭게 담을 수 있습니다. 수량을 0으로 지우면 그 품목은 주문에서 빠집니다.
5. 표 위의 무료배송 배너를 보면서 "○○ 제품 ○개 더 추가하면 무료배송!" 안내에 맞춰 수량을 조절하면 배송비를 아낄 수 있습니다.

**버튼·항목 하나하나의 의미**
- **사이즈 입력칸(S/M/L/XL)** — 그 사이즈의 주문 수량. 0~999까지 입력 가능합니다. 회색으로 막혀 있는 칸은 그 제품에 없는 사이즈라 입력할 수 없습니다.
- **단가** — 우리 거래처에 적용되는 가격입니다. 우리만의 특별 할인(고정가 또는 카테고리 할인)이 있으면 빨간 글씨로 `-10%` 처럼 할인율이 함께 표시됩니다.
- **소계** — 그 제품 행의 전체 수량 × 단가 합계입니다.
- **배송비** — 기본 4,000원이며, 한 카테고리라도 무료배송 기준 수량(무릎 20개·상지 25개·하지 20개·스프린트 40개)을 채우면 **무료**로 바뀝니다.
- **[발주하기] 버튼** (PC는 오른쪽 사이드바, 모바일은 요약 카드/하단 바) — 담은 내용을 가지고 다음 단계인 **발주 확인 화면**으로 넘어갑니다.

> **주의 — 마감 시간**
> 화면 상단 안내처럼 **택배 마감 15:30 이전에 접수된 주문이 당일 출고**됩니다. 마감이 지나면 안내 바가 빨간색으로 바뀌며, 그 이후 주문은 다음 영업일 처리될 수 있습니다.

> **팁** — 제품을 하나도 담지 않고 [발주하기]를 누르면 "주문할 제품을 선택해주세요." 안내가 뜹니다. 수량을 한 개 이상 입력한 뒤 진행하세요.

주문할 제품을 다 담았으면 **[발주하기]** 를 눌러 마지막 확인 단계로 넘어가 보겠습니다.

---

### 4.4 발주 확인 — 배송지·배송방법 정하고 제출하기

발주 확인 화면은 주문을 최종 제출하기 전에 **무엇을, 어디로, 어떻게 받을지**를 정하는 화면입니다. 여기서 [발주 제출]을 눌러야 비로소 알티바이오에 주문이 접수됩니다.

**화면 구성 (위에서부터)**
1. **주문 제품** — 담은 제품이 제품명·사이즈·단가·수량·금액 표로 정리되어 나오고, 아래에 **합계 금액**이 표시됩니다.
2. **배송지 선택** — 우리 거래처에 등록된 배송지 목록이 라디오 버튼으로 나옵니다. "기본" 배지가 붙은 배송지가 처음부터 선택되어 있습니다.
3. **배송 방법** — `택배 / 방문수령 / 퀵(추가비용 별도)` 중 하나를 고릅니다. 기본값은 택배입니다.
4. **비고 / 메모** — 배송 요청사항이나 참고사항을 자유롭게 적는 칸입니다.
5. **최종 결제 금액** — 배송비를 포함한 최종 금액과 "배송비 무료" 또는 "배송비 4,000원 포함" 안내가 나옵니다.
6. 맨 아래 **[이전으로]**, **[발주 제출]** 버튼.

**사용 시나리오 — 배송지 고르기**
1. 등록된 배송지 중 받을 곳을 라디오 버튼으로 선택합니다. 각 항목에는 별칭, 주소, 수령인, 연락처, 배송 메모가 함께 표시되어 헷갈리지 않습니다.
2. 이번 주문만 다른 곳으로 받고 싶다면, 목록 아래 **"이번 주문만 다른 주소로 배송 (저장 안 함)"** 을 선택하세요. 그러면 **받는 분 / 연락처 / 배송 주소 / 배송 메모** 입력칸이 나타납니다. 여기에 적은 주소는 이번 주문에만 쓰이고 저장되지 않습니다.
3. 앞으로 계속 쓸 새 배송지를 등록하려면 **[+ 신규 배송지 추가]** 버튼을 누르세요. 작은 창(모달)이 열립니다.

**신규 배송지 추가 모달 — 항목 설명**
- **배송지 별칭 \*** — 예: "강남 지점", "수원 창고" (필수)
- **수령인** — 미입력 시 담당자명으로 자동 처리됩니다.
- **연락처** — 받는 분 전화번호
- **배송 주소 \*** — 도로명 주소 + 상세주소 (필수)
- **배송 메모** — 예: "토요일 수령 불가"
- **기본 배송지로 설정** 체크박스 — 체크하면 이 주소가 앞으로 기본 배송지가 됩니다.
- 별칭과 주소는 반드시 입력해야 하며, 비우고 저장하면 "별칭과 주소를 입력해주세요." 안내가 뜹니다. 저장하면 배송지 목록에 추가되고 자동으로 선택됩니다.

**사용 시나리오 — 제출하기**
1. 배송지를 고르고, **배송 방법**(택배/방문수령/퀵)을 선택합니다.
2. 필요하면 **비고/메모**에 요청사항을 적습니다.
3. **최종 결제 금액**을 다시 한번 확인합니다.
4. **[발주 제출]** 버튼을 누릅니다. 잠시 "발주 처리 중..." 표시 후, "발주가 성공적으로 접수되었습니다" 라는 **발주 완료 창**이 뜹니다. 이 창에는 정식 **주문번호**, 품목 수, 배송 방법, 합계, 배송지 정보가 정리되어 나옵니다.
5. 완료 창에서 확인을 누르면 자동으로 **발주 내역 화면**으로 이동하며, 방금 넣은 주문이 목록 맨 위에 나타납니다.

**버튼 하나하나의 의미**
- **[+ 신규 배송지 추가]** — 새 배송지를 등록하는 창을 엽니다.
- **[이전으로]** — 주문서(발주 화면)로 되돌아가 수량을 더 고칠 수 있습니다. 담은 내용은 유지됩니다.
- **[발주 제출]** — 주문을 알티바이오에 정식으로 접수합니다.

> **주의 — 배송지를 반드시 지정**
> 배송지를 고르지 않았거나 임시 주소의 주소칸을 비운 채 제출하면 "배송지를 선택하거나 입력해주세요." 안내가 뜨고 제출되지 않습니다.

> **주의 — 단가는 제출 시점 기준으로 확정**
> 주문이 접수되면 그 시점의 단가로 금액이 고정됩니다. 이후 제품 가격이 바뀌어도 이미 넣은 주문 금액은 변하지 않습니다. 화면에 보이는 단가는 우리 거래처에 적용된 가격이지만, 최종 금액은 알티바이오 시스템에서 다시 한번 정확히 계산해 확정합니다.

주문을 제출했으니, 이제 발주 내역에서 진행 상황을 따라가 보겠습니다.

---

### 4.5 발주 내역 — 지난 주문 찾아보기

발주 내역 화면은 우리 거래처가 넣은 모든 주문을 기간별로 모아 보는 곳입니다. 하단 메뉴의 **[내역]** 으로 들어갑니다.

**화면 구성**
1. **기간 필터 버튼** — `이번달 / 1개월 / 3개월 / 전체 / 직접설정` 다섯 개의 버튼이 있습니다. 처음에는 "이번달"이 선택되어 있습니다.
2. **직접설정 날짜 입력** — "직접설정"을 누르면 시작일~종료일을 직접 고르는 날짜 입력칸이 나타납니다.
3. **기간·건수 라벨** — 현재 보고 있는 기간과 그 기간의 주문 건수를 알려 줍니다. (예: "2026년 6월 · 3건")
4. **주문 카드 목록** — 조건에 맞는 주문이 카드로 나옵니다. 각 카드에는 주문번호, 진행 상태 배지, 제품 요약, 배송 방법, 금액, 날짜·시간이 표시됩니다.

**사용 시나리오**
1. 보고 싶은 기간 버튼을 누릅니다. **이번달**, 최근 **1개월**, 최근 **3개월**, **전체** 중에서 고르면 목록이 즉시 바뀝니다.
2. 특정 구간을 보고 싶으면 **[직접설정]** 을 누른 뒤 시작일과 종료일을 골라 보세요. 날짜를 바꿀 때마다 목록이 갱신됩니다.
3. 자세히 보고 싶은 주문 카드를 누르면 그 주문의 **출고 상태 화면**으로 이동합니다.

**버튼·항목 의미**
- **이번달 / 1개월 / 3개월 / 전체 / 직접설정** — 보여 줄 주문의 기간을 정하는 버튼입니다.
- **상태 배지** — 거래처가 보기 쉽게 4단계(**접수 → 확인중 → 준비중 → 출고완료**)로 단순화해 보여 줍니다. 취소된 주문은 빨간 "취소" 배지가 붙습니다.
- **"수정"/"마감" 표시** — 아직 "접수" 상태이고 당일 마감 전이면 "수정" 글씨가 보입니다. (현재 데모에서는 수정 기능 대신 안내만 표시됩니다.) 마감이 지나면 "마감"으로 바뀝니다.

> **팁** — 해당 기간에 주문이 없으면 "해당 기간에 발주 내역이 없습니다" 라고 안내됩니다. 기간 버튼을 "전체"로 바꿔 다시 확인해 보세요.

주문 카드를 눌러 진행 상황을 확인하는 화면으로 넘어가 보겠습니다.

---

### 4.6 출고 상태 — 내 주문 진행 상황 추적 + 취소 요청

출고 상태 화면은 선택한 주문 하나가 **지금 어느 단계까지 와 있는지**를 보여 주는 화면입니다. 홈의 최근 발주 카드나 발주 내역의 주문 카드를 누르면 이 화면으로 들어옵니다.

**화면 구성 (위에서부터)**
1. **상단 정보 영역** — 왼쪽 위 **[‹ 발주 내역으로]** 버튼으로 목록에 되돌아갈 수 있습니다. 그 아래 주문번호, 거래처명, 발주일시, 배송방법, 현재 상태 배지가 정리되어 있습니다. 포장이 시작됐다면 박스 수·무게·송장번호 정보도 함께 보입니다.
2. **송장번호 영역** — 송장번호가 발급된 경우에만 나타납니다.
3. **출고 진행 상태** — **접수 → 확인중 → 준비중 → 출고완료** 4단계가 점·선으로 표시됩니다. 완료된 단계는 체크 표시, 현재 단계는 "진행중"으로 강조됩니다.
4. **주문 상세** — 주문한 제품·사이즈·단가·수량·금액 표와 합계가 나옵니다.

**사용 시나리오 — 진행 상황 보기**
1. 진행 단계 표시를 보면 내 주문이 지금 어디까지 왔는지 한눈에 알 수 있습니다.
2. **[‹ 발주 내역으로]** 버튼을 누르면 다시 목록으로 돌아갑니다.

**사용 시나리오 — 발주 취소 요청**
아직 **포장 단계 전(접수·확인중·준비중 일부)** 인 주문은 거래처가 직접 취소를 요청할 수 있습니다.
1. 상단 정보 영역에 빨간 **[발주 취소 요청]** 버튼과 "포장 단계 전까지 취소 가능" 안내가 보이면 취소가 가능한 상태입니다.
2. 버튼을 누르면 **취소 사유**를 입력하는 작은 창이 뜹니다. 사유를 적고 확인하세요.
3. 취소가 처리되면 "○○○ 취소 완료 — 알티바이오 시스템에 반영되었습니다" 안내가 뜨고, 주문 상태가 "취소"로 바뀝니다.

> **주의 — 되돌릴 수 없는 동작**
> 발주 취소는 한 번 처리되면 되돌릴 수 없습니다. 또한 **포장 단계 이후로는 거래처가 직접 취소할 수 없습니다.** 이 경우 화면에 "포장 단계 이후로 발주 취소가 불가능합니다" 안내만 표시되며, 문제가 있으면 알티바이오로 직접 연락해 주셔야 합니다.

---

### 4.7 공지사항 — 알티바이오가 보낸 안내 보기

공지사항 화면은 알티바이오(경영지원·영업·품질관리·대표 등)가 거래처에 보낸 안내를 모아 보는 곳입니다. 하단 메뉴의 **[공지]** 로 들어가며, 읽지 않은 공지가 있으면 메뉴 아이콘에 빨간 **숫자 배지**가 붙습니다.

**화면 구성**
- 받은 공지가 카드 목록으로 표시됩니다. 중요(빨강)하거나 고정된 공지가 위쪽에 먼저 오고, 그다음 최신순으로 정렬됩니다.
- 각 카드에는 제목, 작성자, 작성일, (있다면) 만료일, 본문이 표시됩니다. 아직 읽지 않은 공지에는 **NEW** 표시가, 중요한 공지에는 "[중요]", 고정 공지에는 "[고정]" 표시가 붙습니다.

**사용 시나리오**
1. 하단 메뉴의 **[공지]** 를 누르면 우리 거래처에 해당하는 공지만 모아서 보여 줍니다.
2. 공지 페이지를 열면 그 안의 안 읽은 공지가 자동으로 "읽음" 처리되어, 메뉴의 빨간 배지 숫자가 줄어듭니다.
3. 홈 화면의 공지 미니 카드를 눌러서도 이 페이지로 바로 올 수 있습니다.

> **팁 — 로그인 시 공지 팝업**
> 읽지 않은 새 공지가 있으면 로그인 직후 화면 가운데에 가장 중요한 공지 하나가 팝업으로 떠오릅니다. **[확인]** 으로 닫으면 되고, **"다시 보지 않기"** 를 체크하고 닫으면 그 공지는 다시 팝업으로 뜨지 않습니다. 받은 공지가 없으면 "받은 공지사항이 없습니다" 라고 표시됩니다.

---

### 4.8 내 계정 — 거래처 정보 확인과 로그아웃

내 계정 화면은 우리 거래처의 기본 정보를 확인하고, 포털에서 로그아웃하는 곳입니다. 하단 메뉴의 **[계정]** 으로 들어갑니다. (PC에서는 오른쪽 위 동그란 사용자 버튼을 눌러도 비슷한 계정 정보 창이 열립니다.)

**화면 구성**
- 거래처명, **담당자, 유형(병원/대리점 등), 이메일, 전화, 결제조건, 마감기간, 주소** 가 정리되어 표시됩니다. 이 정보는 읽기 전용입니다.
- 맨 아래에 빨간 테두리의 **[로그아웃]** 버튼이 있습니다.

**사용 시나리오**
1. 등록된 우리 거래처 정보가 맞는지 확인합니다. 정보 수정이 필요하면 알티바이오 담당자에게 요청하세요. (이 화면에서 직접 수정하지는 않습니다.)
2. 사용을 마쳤으면 **[로그아웃]** 버튼을 누릅니다. 안전하게 로그아웃되며 로그인 화면으로 돌아갑니다.

> **팁** — 공용 PC나 공용 기기에서 사용했다면 반드시 **[로그아웃]** 을 눌러 주세요. 로그아웃하지 않으면 다음 사람이 우리 거래처 정보와 발주 내역을 볼 수 있습니다.

---

### 4.9 마무리 — 전체 흐름 한 번에 정리

지금까지의 화면을 실제 업무 순서로 이으면 다음과 같습니다.

1. **로그인**(4.1) 으로 포털에 들어가면 → **홈 화면**(4.2)에서 이번 달 발주 현황과 새 공지를 확인합니다.
2. **[발주하기]**(4.3)로 엑셀형 주문서에 사이즈별 수량을 입력하고 → **[발주하기]** 로 **발주 확인**(4.4) 화면으로 넘어갑니다.
3. 발주 확인에서 **배송지·배송방법·메모**를 정하고 **[발주 제출]** 을 누르면 → 주문번호가 발급되고 알티바이오에 접수됩니다.
4. 이후 **발주 내역**(4.5)과 **출고 상태**(4.6) 화면에서 진행 단계(접수→확인중→준비중→출고완료)를 추적하고, 필요하면 **포장 전까지** 취소를 요청할 수 있습니다.
5. 그 사이 알티바이오의 안내는 **공지사항**(4.7)으로 받아 보고, 정보 확인·로그아웃은 **내 계정**(4.8)에서 처리합니다.

화면 어디에서든 하단(모바일) 또는 상단(PC)의 **홈 · 발주 · 내역 · 공지 · 계정** 메뉴로 언제든 원하는 화면으로 이동할 수 있으니, 순서에 얽매이지 말고 편하게 사용하시면 됩니다.

## 5. 대표 포털 사용법

![대표 포털 대시보드 화면](qa-test-guide/images/ceo-dashboard.png)

대표 포털은 회사의 최고 의사결정권자(대표·임원진)가 **전사 현황을 한눈에 파악**하고, 필요한 지표를 직접 골라 대시보드로 구성하며, 거래처에 공지를 보내고, 직원·조직을 관리하기 위한 공간입니다. 다른 팀 포털(영업·경영지원·품질관리)이 "일을 처리하는 곳"이라면, 대표 포털은 "결과를 보고 판단하는 곳"이라고 생각하시면 됩니다.

- **접속 주소**: `http://localhost:3000/ceo`
- **로그인 계정 예시**: `owner@rtbio.com` (비밀번호는 관리자가 안내한 비밀번호를 사용하세요)
- **권한**: 대표(TENANT_OWNER) / 임원진. 이 두 역할만 대표 포털에 들어올 수 있습니다.

로그인하면 화면 왼쪽에 메뉴(사이드바)가 있고, 오른쪽에 선택한 화면이 펼쳐집니다. 왼쪽 위에는 회사 로고와 함께 현재 로그인한 사람의 이름("정대표")과 직책("대표이사")이 표시됩니다.

> **휴대폰·태블릿에서 보실 때**: 화면이 좁으면 왼쪽 메뉴가 숨겨집니다. 화면 맨 위 왼쪽의 줄 세 개(☰, 햄버거) 버튼을 누르면 메뉴가 나타납니다.

사이드바 메뉴는 위에서부터 아래 순서로 구성되어 있습니다. 이 매뉴얼도 같은 순서로 하나씩 안내해 드리겠습니다.

| 구역 | 메뉴 | 설명 |
|------|------|------|
| 대표 | **임원 대시보드** | 내가 직접 꾸미는 지표 대시보드 (첫 화면) |
| 대표 | **통합 현황** | 전사 KPI·팀별 상태·중요 알림 요약 |
| 대표 | **직원별 지표** | 직원·영업사원 업무 실적 |
| 대표 | **📢 공지사항** | 거래처에 공지 발송·관리 |
| 대표 | **직원 관리** | 직원 계정 생성·수정·비밀번호 관리 *(권한 있는 경우만 표시)* |
| 대표 | **팀 관리자 지정** | 팀 리더에게 관리 권한 부여 *(메타관리자만 표시)* |
| 팀 포탈 이동 | 품질관리팀 / 경영지원팀 / 영업팀 | 각 팀 포털로 바로 이동 |

> **메뉴가 안 보여도 정상입니다**: "직원 관리"와 "팀 관리자 지정"은 권한에 따라 자동으로 숨겨집니다. 대표·경영지원 관리자(메타관리자)이거나 팀 관리자로 지정된 분에게만 보입니다. 보이지 않는다면 권한이 없는 것이니 걱정하지 않으셔도 됩니다.

또한 왼쪽 사용자 정보 바로 아래에 **🔑 비밀번호 변경** 링크가, 사이드바 맨 아래에는 **← 역할 전환 (로그아웃)** 링크가 항상 있습니다. 이 두 가지는 아래 5.7에서 따로 설명드립니다.

---

### 5.1 임원 대시보드 (첫 화면)

#### 이 화면은 무엇을 하는 곳인가요

로그인하면 가장 먼저 나타나는 화면입니다. 여기서는 **내가 보고 싶은 숫자(위젯)를 직접 골라 자유롭게 배치**할 수 있습니다. 예를 들어 "이번 달 매출", "총 미수금", "진행 중인 주문 건수" 같은 카드를 원하는 위치에 끌어다 놓고, 크기를 조절하고, 필요 없으면 지울 수 있습니다. 한 번 꾸며 두면 다음에 로그인해도 그대로 유지됩니다.

#### 화면 구성

- **상단 도구 막대(툴바)**: 왼쪽에 "대표 대시보드" 제목과 그 옆에 점 세 개 모양의 **⋮ 더보기 버튼**이 있습니다. 오른쪽에는 **➕ 위젯 추가** 버튼이 있습니다.
- **그리드 영역**: 그 아래 넓은 공간이 위젯들이 놓이는 격자(그리드)입니다. 처음 사용하면 기본 위젯 4개(이번 달 매출 / 총 미수금 / 진행 주문 / 활성 거래처)가 자동으로 채워집니다.

#### 위젯을 추가해 보겠습니다

화면을 처음 꾸밀 때는 오른쪽 위 **➕ 위젯 추가** 버튼을 눌러 보세요. "위젯 추가" 창이 열립니다. 이 창은 위에서부터 세 부분으로 나뉩니다.

1. **🤖 AI에게 말하기**: 원하는 위젯을 말로 설명하면 AI가 알맞은 위젯을 추천해 줍니다. 예를 들어 "이번 달 거래처별 매출을 막대그래프로 보여줘"처럼 입력하고 Enter(또는 보내기)를 누르면, 아래에 추천 위젯 카드가 뜨고 작은 미리보기까지 보여 줍니다. 마음에 들면 카드의 **+ 추가** 버튼을 누르면 대시보드에 바로 들어갑니다.
2. **갤러리에서 선택**: 미리 만들어 둔 위젯 묶음(갤러리)이 카드 형태로 나열됩니다. 각 카드에는 종류(KPI·막대·표 등)와 제목이 적혀 있습니다. **원하는 카드를 클릭하면 즉시 대시보드에 추가**되고 "OO 위젯을 추가했습니다"라는 알림이 잠깐 뜹니다.
3. **+ 직접 만들기**: 갤러리에 원하는 게 없을 때, 처음부터 내가 원하는 위젯을 설계할 수 있습니다. (바로 아래 5.1 "직접 만들기"에서 설명)

원하는 방법으로 위젯을 추가하면 창은 닫히고, 새 위젯이 대시보드 격자에 나타납니다.

#### 위젯을 직접 만들어 보겠습니다

갤러리에 딱 맞는 게 없다면, "위젯 추가" 창에서 **+ 직접 만들기** 버튼을 눌러 보세요. "위젯 직접 만들기" 창이 열립니다. 왼쪽은 설정 영역, 오른쪽은 **미리보기** 영역으로 나뉘어 있어, 설정을 바꿀 때마다 실제 데이터로 결과를 즉시 보여 줍니다.

왼쪽 설정 항목을 위에서부터 채워 보겠습니다.

- **위젯 제목**: 카드 위에 표시될 이름입니다. (예: "이번 달 매출")
- **데이터 소스**: 어떤 자료에서 숫자를 가져올지 고릅니다. 거래명세서·수금·주문·거래처·제품·재고·거래처원장·출고 중에서 선택합니다.
- **차트 종류**: 어떤 모양으로 보여줄지 고릅니다. KPI(큰 숫자 하나), 세로 막대, 가로 막대, 선 그래프, 파이, 도넛, 표, 게이지 중에서 선택합니다.
- **측정값 (집계)**: 무엇을, 어떻게 계산할지 정합니다. 왼쪽에서 계산 방식(합계·건수·평균·최솟값·최댓값·고유개수)을, 오른쪽에서 대상 항목을 고릅니다. "건수"만 셀 때는 대상 항목을 비워 두면 됩니다. (표를 만들 때는 이 항목이 숨겨집니다.)
- **분류 (그룹)**: 막대·선·파이 같은 차트에서, 무엇을 기준으로 나눌지 정합니다. (예: 거래처별, 제품별) — 이 항목은 차트 종류일 때만 보입니다.
- **필터 조건**: 특정 조건에 맞는 자료만 보고 싶을 때 사용합니다. **+ 조건** 버튼을 누르면 조건 한 줄이 추가됩니다. 한 줄은 〔항목〕〔비교 방식(같음·이상·포함 등)〕〔값〕으로 이뤄집니다. 값은 직접 입력하거나, 가운데 드롭다운에서 "이번 달 시작 / 오늘 / 30일 전" 같은 편리한 기간 단축값을 고를 수 있습니다. 조건이 필요 없으면 ✕ 버튼으로 그 줄을 지웁니다.
- **정렬 기준 / 정렬 / 최대 행**: 표나 "상위 N개" 차트를 만들 때 사용합니다. 어떤 항목을 기준으로 내림차순(↓)·오름차순(↑) 정렬할지, 최대 몇 줄까지 보여줄지 정합니다. (KPI에서는 숨겨집니다.)

설정을 바꿀 때마다 오른쪽 미리보기가 자동으로 갱신됩니다. **미리보기가 정상적으로 나오면 오른쪽 아래 저장 버튼이 활성화**됩니다. 설정에 문제가 있으면 미리보기 자리에 안내 문구가 뜨고 저장 버튼은 비활성(회색)으로 남아, 잘못된 위젯이 만들어지는 것을 막아 줍니다. **저장**을 누르면 새 위젯이 대시보드에 추가되고, **취소**나 ✕를 누르면 만들지 않고 닫힙니다.

#### 위젯을 옮기고 크기를 바꾸기

대시보드에 올라온 위젯은 마우스로 **끌어서 위치를 옮길 수** 있습니다. 위젯의 오른쪽 아래 모서리를 잡고 끌면 **크기를 조절**할 수 있습니다. 옮기거나 크기를 바꾸면 자동으로 저장되므로 따로 저장 버튼을 누르지 않아도 됩니다.

#### 위젯 하나하나를 다루기 (우클릭 메뉴)

위젯 위에서 **마우스 오른쪽 버튼을 클릭**하면 작은 메뉴가 나타납니다. 항목은 다음과 같습니다.

- **✏ 위젯 수정**: 위젯을 만들 때 썼던 설정 창을 다시 열어 내용을 고칠 수 있습니다. (제목만 바꾸는 간단 편집 창이 열릴 수도 있습니다.)
- **복제**: 같은 위젯을 하나 더 만듭니다. 비슷한 위젯을 약간만 바꿔 여러 개 두고 싶을 때 편리합니다.
- **새로고침**: 그 위젯의 숫자를 지금 즉시 다시 불러옵니다.
- **삭제**: 위젯을 대시보드에서 없앱니다.

위젯 오른쪽 위 모서리의 **✕ 버튼**으로도 그 위젯을 바로 삭제할 수 있습니다.

> **참고**: 위젯의 숫자는 1분마다 자동으로 갱신되며, 다른 탭을 보다가 대시보드로 돌아오면 즉시 한 번 새로 불러옵니다. 항상 최신 숫자를 보고 계신다고 생각하시면 됩니다.

#### 대시보드 내보내기·가져오기·초기화 (⋮ 더보기 메뉴)

제목 옆 **⋮ 더보기** 버튼을 누르면 세 가지 기능이 나옵니다.

- **대시보드 내보내기**: 지금 꾸민 대시보드 구성을 파일(.json) 하나로 내려받습니다. 백업하거나 다른 곳에서 똑같이 쓰고 싶을 때 사용합니다.
- **대시보드 가져오기**: 위에서 내보낸 파일을 골라 불러오면, 그 안의 위젯들이 대시보드에 추가됩니다.
- **기본 레이아웃으로 초기화**: 지금 배치를 모두 지우고 처음의 기본 위젯 4개로 되돌립니다.

> **주의 — 초기화는 되돌릴 수 없습니다**: "기본 레이아웃으로 초기화"를 누르면 "현재 배치가 사라집니다"라는 확인 창이 뜹니다. 확인을 누르면 지금 꾸민 위젯 배치가 모두 사라집니다. 아깝다 싶으면 먼저 **대시보드 내보내기**로 백업한 뒤 초기화하시는 것을 권합니다.

대시보드를 원하는 대로 꾸미셨다면, 이제 회사 전체 상황을 요약해서 보여주는 다음 화면으로 넘어가 보겠습니다. 왼쪽 메뉴에서 **통합 현황**을 눌러 주세요.

### 5.2 통합 현황

#### 이 화면은 무엇을 하는 곳인가요

전사(회사 전체)의 핵심 숫자와 팀별 상태, 그리고 지금 챙겨야 할 중요 알림을 **한 페이지에 요약**해 보여 주는 임원진 전용 화면입니다. 대시보드처럼 직접 꾸미는 곳이 아니라, 정해진 형식으로 회사 상태를 빠르게 점검하는 용도입니다.

#### 화면 구성

맨 위에 "임원진 전용 페이지 — 전사 통합 현황과 팀별 지표를 확인할 수 있습니다"라는 안내 띠가 있고, 그 아래로 네 부분이 차례로 펼쳐집니다.

1. **핵심 지표(KPI) 4장**:
   - **이번 달 총 매출** — 목표 대비 달성률도 함께 표시됩니다.
   - **총 출고 건수** — 전월 대비 증감률(%)이 함께 표시됩니다.
   - **총 미수금** — 아직 못 받은 돈과 연체 건수가 표시됩니다.
   - **활성 거래처** — 거래 중인 거래처 수(대리점·병원 구분 포함)가 표시됩니다.

2. **팀별 상태 요약**: 세 팀의 오늘 상태를 카드로 보여 줍니다.
   - **품질관리팀**: 오늘 처리·대기 건수, 평균 처리시간, 재고 부족 품목 수
   - **경영지원팀**: 이번 달 명세서 발행·수금액, 미수금 위험 건수
   - **영업팀**: 이번 달 신규 거래처, 총 매출, 최근 학회 성공률

3. **중요 알림**: 지금 챙겨야 할 일을 색깔 있는 띠로 강조해 보여 줍니다. 각 알림 오른쪽에는 **확인** 버튼이 있습니다.
   - 빨간 띠: 재고 부족 경고
   - 노란 띠: 미수금 위험(연체)
   - 파란 띠: 일일 출고 한도 근접

4. **팀별 이번 달 처리 건수 차트**: 세 팀의 처리 건수를 막대그래프로 비교해 보여 줍니다.

#### 알림을 눌러 해당 팀으로 이동하기

각 중요 알림의 **확인** 버튼을 누르면 "해당 팀 포탈로 이동할까요?"라는 확인 창이 뜹니다. 확인을 누르면 그 문제를 처리할 수 있는 팀 포털로 바로 넘어갑니다. 예를 들어 "재고 부족 경고"의 확인을 누르면 품질관리팀 포털로, "미수금 위험"의 확인을 누르면 경영지원팀 포털로 이동합니다.

> **참고**: 이 화면의 숫자(매출·건수 등)는 회사 현황을 보여주기 위한 대표 요약값입니다. 거래처별·항목별로 더 자세히 파고들고 싶을 때는, 위 알림의 **확인** 버튼이나 사이드바 아래쪽 "팀 포탈 이동"으로 해당 팀 포털에 들어가 살펴보시면 됩니다.

회사 전체 상황을 확인하셨다면, 이제 **누가** 그 성과를 냈는지 직원별로 들여다볼 차례입니다. 왼쪽 메뉴에서 **직원별 지표**를 눌러 주세요.

---

### 5.3 직원별 지표

#### 이 화면은 무엇을 하는 곳인가요

직원 한 사람 한 사람의 업무 처리 실적과, 영업사원별 매출 성과를 비교해 볼 수 있는 화면입니다. 누가 얼마나 일을 처리했는지, 영업 실적은 어떤지 순위와 표·그래프로 확인할 수 있습니다.

#### 화면 구성

위에서부터 다음 순서로 펼쳐집니다.

1. **요약 지표 4장**:
   - **이번 달 총 처리** — 전체 직원이 처리한 건수 합계
   - **평균 완료율** — 직원 평균 완료율(목표 95%와 비교)
   - **평균 처리시간** — 건당 평균 소요 시간
   - **현재 가동 인원** — 지금 작업 중인 직원 수

2. **직원 순위표**: 처리 건수가 많은 순서로 직원을 줄 세운 표입니다. 순위(1·2·3등은 색깔 배지), 직원 이름, 처리건수, 평균처리시간, 완료율(막대로 함께 표시), 현재 작업 건수가 한눈에 보입니다.

3. **직원별 상세 카드**: 직원마다 카드 하나씩, 처리건수·평균시간·완료율·현재 작업을 자세히 보여 줍니다.

4. **영업사원 실적**: 영업사원별 카드(매출·발주 건수·신규 거래처·담당 거래처 수)와, 그 아래 **최근 3개월 매출 추이** 선 그래프가 있습니다. 영업사원들의 매출 흐름을 한 그래프에서 비교할 수 있습니다.

> **참고**: 이 화면은 보기 전용입니다. 버튼을 눌러 무엇을 바꾸는 화면이 아니라, 실적을 살펴보고 판단하기 위한 화면입니다. 표와 그래프를 위에서 아래로 훑어보시면 됩니다.

직원들의 실적을 확인하셨다면, 이제 거래처에 알릴 내용을 보내 보겠습니다. 왼쪽 메뉴에서 **📢 공지사항**을 눌러 주세요.

---

### 5.4 공지사항

#### 이 화면은 무엇을 하는 곳인가요

거래처에 보낼 공문·안내를 작성해 발송하고, 지금까지 보낸 공지를 관리하는 화면입니다. 대표가 작성하는 공지는 자동으로 **임원진(🔴)** 발송으로 표시되어, 거래처 포털에서 받는 분들이 "임원진이 보낸 중요 안내"임을 알 수 있습니다.

#### 화면 구성

- **상단**: "공지사항" 제목과 "거래처·내부 공문 발송 + 발송 이력 관리" 설명, 오른쪽에 **＋ 공지 작성** 버튼.
- **필터 줄**: 보낸 공지를 좁혀 보기 위한 검색·필터 4개 — **검색**(제목/본문), **대상**(전체 거래처·대리점·병원·특정 업체), **긴급도**(긴급·일반), **작성자**(경영지원팀·영업팀·품질관리팀·임원진).
- **공지 목록**: 그 아래에 보낸 공지가 카드 형태로 쌓입니다. 각 카드에는 제목·긴급 배지·대상 배지·작성자 배지, 본문, 작성일·만료일, 읽음/대상 건수가 표시됩니다. 상단 고정된 공지는 📌 표시와 함께 빨간 세로선이 붙습니다.

#### 공지를 작성해 발송해 보겠습니다

오른쪽 위 **＋ 공지 작성** 버튼을 누르면 "공지사항 작성 — 🔴 임원진" 창이 열립니다. 다음 항목을 채웁니다.

- **제목** (필수): 공지 제목을 입력합니다.
- **긴급도**: "일반" 또는 "긴급"을 고릅니다. 긴급으로 보내면 거래처 화면에서 빨갛게 강조됩니다.
- **본문** (필수): 공지 내용을 입력합니다.
- **발송 대상**: 누구에게 보낼지 고릅니다.
  - **전체 거래처** — 모든 거래처
  - **대리점만** / **병원만** — 유형별
  - **특정 업체** — 콕 집어 고른 업체들. 이걸 고르면 아래에 업체 선택 영역이 펼쳐집니다.
- **만료일** (선택): 공지를 언제까지 노출할지 날짜로 정합니다. 비워 두면 만료 없이 계속 노출됩니다.
- **상단 고정 (📌 표시)**: 체크하면 그 공지가 목록 맨 위에 📌와 함께 고정됩니다.

**"특정 업체"를 골랐을 때**: 업체 선택 영역에서 검색창에 업체명·유형을 입력해 찾을 수 있고, 목록에서 체크박스로 업체를 고릅니다. 고른 업체는 위쪽에 칩(작은 꼬리표) 형태로 모이고, 칩의 × 를 눌러 빼낼 수 있습니다. **검색결과 전체선택** 버튼으로 검색에 걸린 업체를 한 번에 모두 고르고, **전체해제** 버튼으로 모두 비울 수 있습니다.

내용을 다 채우고 창 아래 발송(확인) 버튼을 누르면 공지가 발송되고, 목록 맨 위에 새 공지가 나타납니다.

> **자주 하는 실수**: 제목이나 본문을 비워 두면 "제목과 본문은 필수입니다"라는 안내가 뜨며 발송되지 않습니다. 또 "특정 업체"를 골랐는데 업체를 하나도 선택하지 않으면 "대상 업체를 1개 이상 선택해주세요"라고 막아 줍니다.

#### 보낸 공지를 미리보기·편집·삭제하기

목록의 각 공지 카드 오른쪽에는 버튼 세 개가 있습니다.

- **미리보기**: 거래처가 받게 될 모습 그대로 공지를 띄워 보여 줍니다. 보내기 전후로 내용을 확인할 때 좋습니다.
- **편집**: 제목·본문·긴급도·상단 고정·만료일을 고칠 수 있는 창이 열립니다. 고친 뒤 **저장**을 누르면 반영됩니다.
- **삭제**: "이 공지를 삭제하시겠습니까? 삭제 후 복구할 수 없습니다"라는 확인 창이 뜹니다. **삭제**를 누르면 공지가 영구히 지워집니다.

> **주의 1 — 발송 대상은 편집으로 바꿀 수 없습니다**: 편집 창에서는 누구에게 보냈는지(발송 대상·대상 업체)는 고칠 수 없습니다. 대상을 바꾸려면 그 공지를 삭제하고 새로 작성해 보내야 합니다.
>
> **주의 2 — 삭제는 되돌릴 수 없습니다**: 삭제한 공지는 복구되지 않습니다. 잘못 보낸 공지를 정리할 때만 신중히 사용하세요. (예전에는 "편집"이 삭제처럼 동작하던 문제가 있었으나 지금은 편집과 삭제가 분리되어 있으니 안심하고 "편집"을 사용하셔도 됩니다.)

공지 발송을 마치셨다면, 다음은 회사 구성원을 관리하는 화면입니다. (권한이 있는 경우) 왼쪽 메뉴에서 **직원 관리**를 눌러 주세요.

---

### 5.5 직원 관리 *(권한 있는 경우만)*

#### 이 화면은 무엇을 하는 곳인가요

직원 계정을 조회하고, 새 직원을 등록하고, 직급·부서·비밀번호를 관리하는 화면입니다. 대표·경영지원 관리자(메타관리자)이거나 팀 관리자로 지정된 분에게만 메뉴가 보입니다.

#### 화면 구성

- **검색·필터 줄**: 이름/이메일 **검색창**, **직급 필터**(권한에 따라 표시), **상태 필터**(활성·전체·비활성, 기본은 "활성"), **+ 신규 직원** 버튼, 그리고 메타관리자에게만 보이는 **⚙ 부서·직급 관리** 버튼.
- **요약 줄**: 총 인원 / 활성 / 비활성 수.
- **직원 표**: 이름(팀관리자면 배지 표시)·이메일·권한·부서·직급·상태·최근 로그인·액션 버튼이 한 줄씩 표시됩니다.

#### 새 직원을 등록해 보겠습니다

**+ 신규 직원** 버튼을 누르면 "신규 직원 등록" 창이 열립니다. 다음을 입력합니다.

- **이름** (필수)
- **권한** (필수): 부여할 수 있는 직급만 목록에 나옵니다. (대표만 다른 사람에게 대표 권한을 줄 수 있습니다.)
- **이메일** (필수)
- **전화** (선택)
- **부서 / 직급** (선택): 미리 등록된 항목 중에서 고릅니다.
- **임시 비밀번호** (필수): 8자 이상. 직원이 처음 로그인한 뒤 직접 바꾸도록 안내해 주세요.

**등록**을 누르면 계정이 만들어집니다. 입력이 빠지면 "이름·이메일·임시 비밀번호는 필수입니다" 같은 안내가 뜨며, 빠진 곳을 채우면 됩니다.

#### 기존 직원을 관리하기 (표의 액션 버튼)

직원 표의 오른쪽 액션 버튼은 그 직원이 활성인지 비활성인지에 따라 달라집니다.

활성 직원에게는:
- **수정**: 이름·전화·부서·직급(권한이 있으면 직급도)을 고칩니다. 이메일은 바꿀 수 없습니다.
- **비번재발급**: 새 임시 비밀번호(8자 이상)를 정해 발급합니다. 발급 후 직원에게 직접 전달하세요.
- **비활성화**: 그 직원의 로그인을 차단합니다. (계정 자체가 삭제되지는 않습니다.)

비활성 직원에게는:
- **재활성화**: 다시 로그인할 수 있도록 되돌립니다.

> **참고 — 비활성화는 삭제가 아닙니다**: "비활성화"를 눌러도 계정과 기록은 남고 로그인만 막힙니다. 그래서 언제든 "재활성화"로 되돌릴 수 있습니다. 퇴사·휴직 등으로 잠시 막아야 할 때 안전하게 쓰실 수 있습니다. 비활성화할 때 그 직원이 거래처 영업담당으로 배정돼 있으면 안내 메시지가 함께 뜹니다.

#### 부서·직급 항목 관리 (메타관리자만)

검색 줄의 **⚙ 부서·직급 관리** 버튼(메타관리자에게만 보임)을 누르면, 직원 등록·수정 시 고를 수 있는 **부서**와 **직급** 항목 목록을 직접 관리할 수 있습니다. 각 항목 옆 **추가**로 새 항목을 넣고, **삭제**로 빼냅니다. (이미 직원에게 입력된 값은 항목을 지워도 그대로 유지됩니다.) **닫기**로 창을 닫습니다.

직원을 등록·관리하셨다면, 팀 리더에게 관리 권한을 줄 수 있습니다. (메타관리자라면) 왼쪽 메뉴에서 **팀 관리자 지정**을 눌러 주세요.

---

### 5.6 팀 관리자 지정 *(메타관리자만)*

#### 이 화면은 무엇을 하는 곳인가요

각 팀의 리더에게 **직원 관리 권한(팀 관리자)**을 부여하거나 해제하는 화면입니다. 대표·경영지원 관리자(메타관리자)에게만 메뉴가 보입니다. 팀 관리자로 지정된 사람은 자기 팀의 직원을 직접 관리할 수 있게 됩니다.

#### 화면 구성

직원 전체가 팀(권한) 순서로 정렬된 표입니다. 각 줄에는 이름·이메일·권한·팀·팀 관리자 여부(배지)·액션 버튼이 있습니다.

#### 팀 관리자를 지정하거나 해제하기

- 아직 팀 관리자가 아닌 직원 줄에는 **관리자 지정** 버튼이 있습니다. 누르면 그 직원이 팀 관리자가 되고 "팀 관리자로 지정되었습니다" 알림이 뜹니다.
- 이미 팀 관리자인 직원 줄에는 **지정 해제** 버튼이 있습니다. 누르면 권한이 회수되고 "팀 관리자 지정이 해제되었습니다" 알림이 뜹니다.

배지가 "팀관리자"로 바뀌었는지로 결과를 확인할 수 있습니다.

> **팁**: 팀 관리자를 지정하면, 대표가 모든 직원을 직접 관리하지 않아도 각 팀 리더가 자기 팀 인원을 관리하게 되어 업무가 한결 가벼워집니다.

---

### 5.7 항상 보이는 기능 — 비밀번호 변경 · 역할 전환 · 팀 포털 이동

대표 포털에서는 어느 화면에 있든 사이드바에 다음 기능이 항상 준비되어 있습니다.

#### 🔑 비밀번호 변경

왼쪽 위 사용자 정보(이름·직책) 바로 아래의 **🔑 비밀번호 변경**을 누르면 "비밀번호 변경" 창이 열립니다. **현재 비밀번호**와 **새 비밀번호**(8자 이상)를 입력하고 **변경**을 누르면 됩니다. 보안을 위해 주기적으로 바꿔 주시는 것을 권합니다.

#### 팀 포탈 이동

사이드바 가운데 "팀 포탈 이동" 구역의 **품질관리팀 / 경영지원팀 / 영업팀** 링크를 누르면 해당 팀의 포털로 곧장 넘어갑니다. 특정 팀의 업무 화면을 직접 살펴봐야 할 때 사용하세요.

#### ← 역할 전환 (로그아웃)

사이드바 맨 아래의 **← 역할 전환 (로그아웃)**을 누르면 대표 포털에서 로그아웃되고 로그인 화면으로 돌아갑니다. 다른 계정으로 로그인하거나 자리를 비울 때 사용하세요.

> **마무리 팁**: 대표 포털의 가장 큰 강점은 **5.1 임원 대시보드**입니다. 자주 챙기는 숫자 몇 개를 위젯으로 올려 두면, 로그인하자마자 회사 상태를 한눈에 파악할 수 있습니다. 처음엔 갤러리에서 마음에 드는 위젯 몇 개를 추가해 보고, 익숙해지면 "직접 만들기"로 나만의 지표를 구성해 보세요.

</script>

<!-- Markdown 렌더 + TOC 생성 (marked.js CDN, 실패 시 원문 표시) -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function(){
  const raw = document.getElementById("md").textContent;
  const target = document.getElementById("mdTarget");
  if (window.marked) {
    marked.setOptions({ gfm: true, breaks: false });
    target.innerHTML = marked.parse(raw);
    // task-list 체크박스 스타일 클래스
    target.querySelectorAll("li").forEach(li => {
      const cb = li.querySelector('input[type=checkbox]');
      if (cb) { li.classList.add("task-list-item"); const ul = li.parentElement; if (ul) ul.classList.add("contains-task-list"); }
    });
  } else {
    target.innerHTML = "<pre style='white-space:pre-wrap'>" + raw.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) + "</pre>";
  }
  // TOC
  const toc = document.getElementById("toc");
  let html = "";
  target.querySelectorAll("h2, h3").forEach((h, i) => {
    const id = "sec-" + i; h.id = id;
    const lv = h.tagName === "H2" ? "" : "h3";
    html += `<a href="#${id}" class="${lv}">${h.textContent}</a>`;
  });
  toc.innerHTML = html;
  // scroll-spy
  const links = [...toc.querySelectorAll("a")];
  const heads = [...target.querySelectorAll("h2, h3")];
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const idx = heads.indexOf(e.target);
        links.forEach(l => l.classList.remove("active"));
        if (links[idx]) links[idx].classList.add("active");
      }
    });
  }, { rootMargin: "-10% 0px -80% 0px" });
  heads.forEach(h => obs.observe(h));
})();
</script>
